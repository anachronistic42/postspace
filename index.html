    <!-- ======================== ОСНОВНОЙ СКРИПТ ======================== -->
    <script>
        // ============================================================
        // ПОЛНАЯ ФУНКЦИОНАЛЬНОСТЬ post36 (слайды, редактор, PDF, и т.д.)
        // ============================================================
        const BG_PRESETS = ['bg-stagnation', 'bg-fog', 'bg-panels', 'bg-film', 'bg-night'];
        const TEXT_COLORS = ['#e8ddc4', '#c8a24a', '#a8442a', '#8a8064', '#d8cba8', '#ffffff', '#6a8a5a', '#5a7a9a'];
        const PLATE_COLORS = ['#14110c', '#1c1810', '#2a2418', '#c8a24a', '#a8442a', '#d8cba8', '#0d1018', '#6a8a5a'];

        // === Пункт 5: добавим флаг original ===
        const PDF_THEMES = [
            { name: 'Стандартный', bg: '#ffffff', text: '#14110c' },
            { name: 'Бежевый', bg: '#d8cba8', text: '#14110c' },
            { name: 'Красный', bg: '#a8442a', text: '#14110c' },
            { name: 'Зелёный', bg: '#6a8a5a', text: '#14110c' },
            { name: 'Чёрный', bg: '#14110c', text: '#e8ddc4' },
            { name: 'Тёмно-коричневый', bg: '#2a2418', text: '#e8ddc4' },
            { name: 'Оригинальный', bg: '#ffffff', text: '#14110c', icon: '🍉', original: true }
        ];

        let state = { slides: [], current: 0, mode: 'edit', projectTitle: 'ПОСТПРОСТРАНСТВО' };
        let uid = 1;
        let selectedEl = null,
            selectedItem = null;
        let viewDragPersist = false;
        let fullSnapshotSlides = null;

        // Функция уведомления
        function showNotification(message, type = 'error', duration = 3000) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();
            const el = document.createElement('div');
            el.className = 'notification ' + type;
            el.textContent = message;
            document.body.appendChild(el);
            setTimeout(() => {
                if (el.parentNode) el.remove();
            }, duration);
        }

        function getTransform(el) {
            return {
                x: parseFloat(el.dataset.x || 0),
                y: parseFloat(el.dataset.y || 0),
                scale: parseFloat(el.dataset.scale || 1),
                rot: parseFloat(el.dataset.rot || 0)
            };
        }

        function applyTransform(el) {
            const { x, y, scale, rot } = getTransform(el);
            el.style.transform = `translate(${x}px, ${y}px) scale(${scale}) rotate(${rot}deg)`;
        }

        function refreshElementSharpness(el) {
            requestAnimationFrame(() => {
                const { x, y, scale, rot } = getTransform(el);
                el.style.transform = `translate(${x}px, ${y}px) scale(${scale}) rotate(${rot}deg)`;
            });
        }

        function defaultSlides() {
            return [{
                bgPreset: 'bg-stagnation',
                items: [
                    { id: 'el1', type: 'text', kind: 'tag', left: '8vw', top: '18vh', tx: 0, ty: 0, scale: 1,
                        rot: 0, content: 'Я знаю ничего, кроме того, что шестиугольники шепчут:',
                        color: '#a8442a', align: 'left', plate: '', hasFrame: false, z: 4 },
                    { id: 'el2', type: 'text', kind: 'h1', left: '8vw', top: '26vh', tx: 0, ty: 0, scale: 1,
                        rot: 0, content: 'Постпространство появляется там, где вы больше всего уверены в перманентности бытия',
                        color: '#c8a24a', align: 'left', plate: '', hasFrame: false, z: 4 },
                    { id: 'el3', type: 'text', kind: 'sub', left: '8vw', top: '56vh', tx: 0, ty: 0, scale: 1,
                        rot: 0, content: 'Cogitas ergo sum', color: '#8a8064', align: 'left', plate: '',
                        hasFrame: false, z: 4 }
                ]
            }];
        }

        function getCaptionColor(plate) {
            if (!plate) return '#4a4030';
            const darkColors = ['#14110c', '#1c1810', '#2a2418', '#0d1018'];
            if (darkColors.includes(plate)) return '#e8ddc4';
            if (plate === '#a8442a' || plate === '#6a8a5a') return '#14110c';
            return '#4a4030';
        }

        function getDocType(fileType) {
            if (fileType === 'application/pdf') return 'pdf';
            if (fileType === 'text/plain') return 'txt';
            if (fileType === 'application/msword') return 'doc';
            if (fileType === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') return 'docx';
            return null;
        }

        function isDocFile(file) {
            const types = ['application/pdf', 'text/plain', 'application/msword',
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
            ];
            return types.includes(file.type) || file.name.match(/\.(pdf|txt|doc|docx)$/i);
        }

        function getDocTypeFromName(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (ext === 'pdf') return 'pdf';
            if (ext === 'txt') return 'txt';
            if (ext === 'doc') return 'doc';
            if (ext === 'docx') return 'docx';
            return null;
        }

        function buildItemElement(item, slideIdx) {
            const div = document.createElement('div');
            div.className = 'draggable';
            div.dataset.id = item.id;
            div.style.left = item.left;
            div.style.top = item.top;
            div.dataset.x = item.tx || 0;
            div.dataset.y = item.ty || 0;
            div.dataset.scale = item.scale || 1;
            div.dataset.rot = item.rot || 0;
            div.style.zIndex = item.z || 4;
            applyTransform(div);

            if (item.type === 'photo') {
                const captionColor = getCaptionColor(item.plate);
                div.innerHTML =
                    `
              <div class="photo ${item.noFrame ? 'no-frame' : ''}" style="${item.plate ? 'background:'+item.plate+';' : ''}">
                <img src="${item.src}" alt="">
                <div class="caption" contenteditable="false" spellcheck="false" style="color:${captionColor}">${escapeHtml(item.content) || 'без названия'}</div>
              </div>`;
            } else if (['pdf', 'doc', 'docx', 'txt'].includes(item.type)) {
                const hasCover = item.cover ? true : false;
                const coverHtml = hasCover ?
                    `<div class="doc-cover-wrap"><img src="${item.cover}" alt="cover"><div class="doc-fold"></div></div>` :
                    '';
                const backHtml = `<div class="doc-back">
              <svg viewBox="0 0 100 140" width="100%" height="100%">
                <rect x="5" y="5" width="90" height="130" rx="6" fill="#f0ede6" stroke="#b8a87a" stroke-width="1.5"/>
                <path d="M75 5 L95 5 L95 25 L75 25 Z" fill="#d8cba8" stroke="#b8a87a" stroke-width="1.5"/>
                <path d="M75 5 L95 25 L75 25 Z" fill="#c0b090"/>
                <line x1="20" y1="40" x2="80" y2="40" stroke="#b8a87a" stroke-width="2" stroke-linecap="round"/>
                <line x1="20" y1="55" x2="80" y2="55" stroke="#b8a87a" stroke-width="2" stroke-linecap="round"/>
                <line x1="20" y1="70" x2="60" y2="70" stroke="#b8a87a" stroke-width="2" stroke-linecap="round"/>
                <line x1="20" y1="85" x2="70" y2="85" stroke="#b8a87a" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>`;
                const lines = [];
                const widths = ['70%', '50%', '60%', '40%', '65%', '45%', '55%', '35%', '60%', '50%'];
                for (let i = 0; i < 10; i++) {
                    lines.push(`<span class="line" style="width:${widths[i]}"></span>`);
                }
                const underHtml =
                    `<div class="doc-under" style="background:${item.plate || '#f0ede6'}">${lines.join('')}</div>`;

                let docWidth = 200;
                let iconHeight = 150;
                if (hasCover && item.coverWidth && item.coverHeight) {
                    let w = item.coverWidth;
                    let h = item.coverHeight;
                    const maxW = 212;
                    const maxH = 260;
                    const minW = 80,
                        minH = 80;
                    let scale = Math.min(maxW / w, maxH / h, 1);
                    if (scale < 1) { w *= scale;
                        h *= scale; }
                    if (w < minW) { scale = minW / w;
                        w *= scale;
                        h *= scale; }
                    if (h < minH) { scale = minH / h;
                        w *= scale;
                        h *= scale; }
                    docWidth = w + 28;
                    iconHeight = h;
                }

                const captionColor = getCaptionColor(item.plate);
                const typeLabel = item.type.toUpperCase();
                div.innerHTML = `
              <div class="doc ${hasCover ? 'has-cover' : ''} ${item.noFrame ? 'no-frame' : ''}" style="${item.plate ? 'background:'+item.plate+';' : ''} width: ${docWidth}px;">
                <div class="doc-icon" style="${hasCover ? `width: ${docWidth-28}px; height: ${iconHeight}px;` : ''}">
                  ${backHtml}
                  ${coverHtml}
                  ${underHtml}
                </div>
                <div class="caption" contenteditable="false" spellcheck="false" style="color:${captionColor}">${escapeHtml(item.content) || typeLabel}</div>
              </div>`;
                const docEl = div.querySelector('.doc');
                setupDocDragDrop(docEl, item, slideIdx);
            } else if (item.type === 'video_placeholder') {
                div.innerHTML = `
              <div class="media-placeholder">
                <span class="icon-big">🎬</span>
                <div class="label">Видео</div>
                <div class="sub">скоро</div>
              </div>`;
            } else if (item.type === 'audio_placeholder') {
                div.innerHTML = `
              <div class="media-placeholder">
                <span class="icon-big">🎵</span>
                <div class="label">Аудио</div>
                <div class="sub">скоро</div>
              </div>`;
            } else { // text
                const kindClass = item.kind ? `text-item kind-${item.kind}` : 'text-item';
                let style = '';
                if (item.align) style += `text-align:${item.align};`;
                if (item.hasFrame) {
                    const plate = item.plate || '#d8cba8';
                    style += `background:${plate};`;
                    style += `color:${getCaptionColor(plate)};`;
                } else {
                    if (item.color) style += `color:${item.color};`;
                }
                const frameClass = item.hasFrame ? ' has-frame' : '';
                div.innerHTML =
                    `<div class="${kindClass}${frameClass}" style="${style}"><div class="text-body" contenteditable="false" spellcheck="false">${item.content || 'Текст'}</div></div>`;
            }
            attachItemEvents(div, item, slideIdx);
            return div;
        }

        function setupDocDragDrop(docEl, item, slideIdx) {
            docEl.addEventListener('dragover', (e) => { e.preventDefault();
                e.stopPropagation();
                docEl.classList.add('drag-over'); });
            docEl.addEventListener('dragleave', (e) => { e.preventDefault();
                e.stopPropagation();
                docEl.classList.remove('drag-over'); });
            docEl.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                docEl.classList.remove('drag-over');
                const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
                if (files.length === 0) return;
                const file = files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        item.cover = ev.target.result;
                        item.coverWidth = img.width;
                        item.coverHeight = img.height;
                        const parent = docEl.closest('.draggable');
                        if (parent) {
                            const newEl = buildItemElement(item, slideIdx);
                            parent.replaceWith(newEl);
                            if (selectedItem && selectedItem.id === item.id) {
                                selectedEl = newEl;
                                showDocToolbar(newEl, item);
                                showCtrlOverlay(newEl);
                            }
                            autoSave();
                        }
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function syncTransformToItem(el, item) {
            const t = getTransform(el);
            item.tx = t.x;
            item.ty = t.y;
            item.scale = t.scale;
            item.rot = t.rot;
            item.z = parseInt(el.style.zIndex) || 4;
        }

        function applyTextStyles(el, item) {
            const txtDiv = el.querySelector('.text-item');
            if (!txtDiv) return;
            if (item.hasFrame) {
                const plate = item.plate || '#d8cba8';
                txtDiv.style.background = plate;
                txtDiv.style.color = getCaptionColor(plate);
            } else {
                txtDiv.style.background = '';
                txtDiv.style.color = item.color || '';
            }
            if (item.align) txtDiv.style.textAlign = item.align;
        }

        function togglePalettes(item) {
            const colorCont = document.getElementById('textColorSwatches');
            const frameCont = document.getElementById('textFrameSwatches');
            if (!colorCont || !frameCont) return;
            if (item.hasFrame) {
                colorCont.style.display = 'none';
                frameCont.style.display = 'flex';
            } else {
                colorCont.style.display = 'flex';
                frameCont.style.display = 'none';
            }
        }

        function attachItemEvents(el, item, slideIdx) {
            el.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                const isView = state.mode === 'view';
                const isEditing = state.mode === 'edit';
                if (isEditing && e.target.closest('.caption, .text-body') && e.target.isContentEditable) return;
                e.preventDefault();
                if (isView) startViewDrag(el, item, e);
                else if (isEditing) startEditDrag(el, item, e);
            });

            el.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (state.mode === 'view') {
                    if (item.type === 'photo') {
                        const img = el.querySelector('img');
                        if (img) openViewer(img.src);
                    } else if (['pdf', 'doc', 'docx', 'txt'].includes(item.type)) {
                        openDocumentViewer(item);
                    } else if (item.type === 'text') {
                        const body = el.querySelector('.text-body');
                        if (body) {
                            const text = body.innerHTML;
                            openTextViewer(text);
                        }
                    } else {
                        el.classList.add('view-pop');
                        setTimeout(() => el.classList.remove('view-pop'), 400);
                    }
                } else if (state.mode === 'edit') {
                    selectElement(el, item);
                }
            });

            const editable = el.querySelector('[contenteditable]');
            if (editable) {
                editable.addEventListener('blur', () => {
                    editable.setAttribute('contenteditable', 'false');
                    item.content = editable.innerHTML;
                    syncTransformToItem(el, item);
                    autoSave();
                });
                editable.addEventListener('mousedown', (e) => e.stopPropagation());
            }
        }

        function startEditDrag(el, item, e) {
            if (selectedEl === el) deselect();
            const startX = e.clientX,
                startY = e.clientY;
            const tr = getTransform(el);
            let moved = false;
            el.classList.add('dragging-edit');

            function move(ev) {
                const dx = ev.clientX - startX,
                    dy = ev.clientY - startY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
                el.dataset.x = tr.x + dx;
                el.dataset.y = tr.y + dy;
                applyTransform(el);
            }

            function up() {
                document.removeEventListener('pointermove', move);
                document.removeEventListener('pointerup', up);
                el.classList.remove('dragging-edit');
                if (moved) {
                    syncTransformToItem(el, item);
                    refreshElementSharpness(el);
                    autoSave();
                }
            }
            document.addEventListener('pointermove', move);
            document.addEventListener('pointerup', up);
        }

        function startViewDrag(el, item, e) {
            const isPersist = viewDragPersist;
            const startX = e.clientX,
                startY = e.clientY;
            const startTransform = getTransform(el);
            let moved = false;
            let lastX = startX,
                lastY = startY;

            el.classList.add('dragging-view');

            function move(ev) {
                const dx = ev.clientX - startX,
                    dy = ev.clientY - startY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
                lastX = ev.clientX;
                lastY = ev.clientY;
                const tilt = Math.max(-8, Math.min(8, dx * 0.04));
                const tmpTx = startTransform.x + dx;
                const tmpTy = startTransform.y + dy;
                if (isPersist) {
                    el.dataset.x = tmpTx;
                    el.dataset.y = tmpTy;
                }
                const tmpScale = isPersist ? startTransform.scale : startTransform.scale * 1.02;
                el.style.transform =
                    `translate(${tmpTx}px, ${tmpTy}px) scale(${tmpScale}) rotate(${startTransform.rot + tilt}deg)`;
            }

            function up(ev) {
                document.removeEventListener('pointermove', move);
                document.removeEventListener('pointerup', up);
                el.classList.remove('dragging-view');
                if (moved) {
                    if (isPersist) {
                        const finalX = startTransform.x + (lastX - startX);
                        const finalY = startTransform.y + (lastY - startY);
                        el.dataset.x = finalX;
                        el.dataset.y = finalY;
                        applyTransform(el);
                        syncTransformToItem(el, item);
                        refreshElementSharpness(el);
                        autoSave();
                    } else {
                        el.dataset.x = startTransform.x;
                        el.dataset.y = startTransform.y;
                        applyTransform(el);
                    }
                } else {
                    el.classList.add('view-pop');
                    setTimeout(() => el.classList.remove('view-pop'), 400);
                }
            }
            document.addEventListener('pointermove', move);
            document.addEventListener('pointerup', up);
        }

        function selectElement(el, item) {
            if (selectedEl) deselect();
            selectedEl = el;
            selectedItem = item;
            el.classList.add('selected');
            showCtrlOverlay(el);
            if (item.type === 'photo') showPhotoToolbar(el, item);
            else if (['pdf', 'doc', 'docx', 'txt'].includes(item.type)) showDocToolbar(el, item);
            else if (item.type === 'video_placeholder' || item.type === 'audio_placeholder') {
                const tb = document.getElementById('itemToolbar');
                tb.innerHTML = `<span style="color:var(--muted);font-size:13px;padding:4px 10px;">🧪 заглушка</span>`;
                tb.classList.add('show');
                const rect = el.getBoundingClientRect();
                tb.style.left = rect.left + 'px';
                tb.style.top = (rect.top - 50) + 'px';
            } else showTextToolbar(el, item);
        }

        function deselect() {
            if (selectedEl) selectedEl.classList.remove('selected');
            selectedEl = null;
            selectedItem = null;
            document.getElementById('ctrlOverlay').classList.remove('show');
            document.getElementById('itemToolbar').classList.remove('show');
            document.getElementById('textToolbar').classList.remove('show');
        }

        function showCtrlOverlay(el) {
            const overlay = document.getElementById('ctrlOverlay');
            const box = overlay.querySelector('.ctrl-box');
            const rect = el.getBoundingClientRect();
            box.style.left = rect.left + 'px';
            box.style.top = rect.top + 'px';
            box.style.width = rect.width + 'px';
            box.style.height = rect.height + 'px';
            const hd = overlay.querySelector('.h-del'),
                hs = overlay.querySelector('.h-scale'),
                hr = overlay.querySelector('.h-rotate');
            const hUp = overlay.querySelector('.h-up'),
                hDown = overlay.querySelector('.h-down');
            hd.style.left = rect.right + 'px';
            hd.style.top = rect.top + 'px';
            hs.style.left = rect.right + 'px';
            hs.style.top = rect.bottom + 'px';
            hr.style.left = rect.left + 'px';
            hr.style.top = rect.top + 'px';
            hUp.style.left = rect.left + rect.width / 2 + 'px';
            hUp.style.top = rect.top - 12 + 'px';
            hDown.style.left = rect.left + rect.width / 2 + 'px';
            hDown.style.top = rect.bottom + 12 + 'px';
            overlay.classList.add('show');
        }

        document.querySelectorAll('#ctrlOverlay .handle').forEach(btn => {
            btn.addEventListener('pointerdown', (e) => { e.stopPropagation(); });
            if (btn.classList.contains('h-del')) btn.addEventListener('click', () => { if (selectedEl && selectedItem)
                    deleteCurrentItem(); });
            if (btn.classList.contains('h-scale')) btn.addEventListener('pointerdown', startScale);
            if (btn.classList.contains('h-rotate')) btn.addEventListener('pointerdown', startRotate);
            if (btn.classList.contains('h-up')) btn.addEventListener('click', () => changeZIndex(1));
            if (btn.classList.contains('h-down')) btn.addEventListener('click', () => changeZIndex(-1));
        });

        function startScale(e) { if (!selectedEl) return;
            e.preventDefault(); const el = selectedEl,
                item = selectedItem; const rect = el.getBoundingClientRect(); const cx = rect.left + rect.width / 2,
                cy = rect.top + rect.height / 2; const startDist = Math.hypot(e.clientX - cx, e.clientY - cy); const
                startScale = getTransform(el).scale;

            function move(ev) { let s = startScale * (Math.hypot(ev.clientX - cx, ev.clientY - cy) / startDist);
                s = Math.max(0.2, Math.min(6, s));
                el.dataset.scale = s;
                applyTransform(el);
                showCtrlOverlay(el); }

            function up() { document.removeEventListener('pointermove', move);
                document.removeEventListener('pointerup', up);
                syncTransformToItem(el, item);
                refreshElementSharpness(el);
                autoSave(); }
            document.addEventListener('pointermove', move);
            document.addEventListener('pointerup', up); }

        function startRotate(e) { if (!selectedEl) return;
            e.preventDefault(); const el = selectedEl,
                item = selectedItem; const rect = el.getBoundingClientRect(); const cx = rect.left + rect.width / 2,
                cy = rect.top + rect.height / 2; const startAng = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math
                .PI; const startRot = getTransform(el).rot;

            function move(ev) { const ang = Math.atan2(ev.clientY - cy, ev.clientX - cx) * 180 / Math.PI;
                el.dataset.rot = startRot + (ang - startAng);
                applyTransform(el);
                showCtrlOverlay(el); }

            function up() { document.removeEventListener('pointermove', move);
                document.removeEventListener('pointerup', up);
                syncTransformToItem(el, item);
                refreshElementSharpness(el);
                autoSave(); }
            document.addEventListener('pointermove', move);
            document.addEventListener('pointerup', up); }

        function changeZIndex(delta) { if (!selectedEl) return; let newZ = (parseInt(selectedEl.style.zIndex) || 4) +
            delta;
            newZ = Math.max(1, Math.min(100, newZ));
            selectedEl.style.zIndex = newZ; if (selectedItem) selectedItem.z = newZ;
            autoSave(); }

        function deleteCurrentItem() { if (!selectedEl || !selectedItem) return; const slide = state.slides[state
            .current];
            slide.items = slide.items.filter(i => i.id !== selectedItem.id);
            selectedEl.remove();
            deselect();
            autoSave(); if (slide.items.length === 0) { const itemsLayer = document.querySelector(
                    `.section[data-index="${state.current}"] .items-layer`); if (itemsLayer && !itemsLayer.querySelector(
                    '.empty-hint')) { const hint = document.createElement('div');
                    hint.className = 'empty-hint';
                    hint.innerText = 'Пустой слайд\nПеретащите фото или добавьте текст';
                    itemsLayer.appendChild(hint); } } }

        function showPhotoToolbar(el, item) {
            const tb = document.getElementById('itemToolbar');
            tb.innerHTML = '';
            const photoDiv = el.querySelector('.photo');
            const toggleBtn = document.createElement('button');
            toggleBtn.textContent = photoDiv.classList.contains('no-frame') ? '🖼 Рамка' : '◻ Без рамки';
            toggleBtn.className = 'tool-btn';
            toggleBtn.onclick = () => {
                item.noFrame = !item.noFrame;
                photoDiv.classList.toggle('no-frame', item.noFrame);
                autoSave();
                showPhotoToolbar(el, item);
                if (selectedEl) showCtrlOverlay(selectedEl);
            };
            const editBtn = document.createElement('button');
            editBtn.textContent = '✎ Редактировать текст';
            editBtn.className = 'tool-btn';
            editBtn.onclick = () => {
                const cap = el.querySelector('.caption');
                if (cap) { cap.setAttribute('contenteditable', 'true');
                    cap.focus(); }
            };
            const colorGroup = document.createElement('div');
            colorGroup.className = 'swatch-group';
            PLATE_COLORS.forEach(c => {
                const sw = document.createElement('div');
                sw.className = 'swatch';
                sw.style.background = c;
                sw.onclick = () => {
                    item.plate = c;
                    photoDiv.style.background = c;
                    const cap = photoDiv.querySelector('.caption');
                    if (cap) cap.style.color = getCaptionColor(c);
                    autoSave();
                };
                colorGroup.appendChild(sw);
            });
            tb.appendChild(toggleBtn);
            tb.appendChild(editBtn);
            tb.appendChild(colorGroup);
            tb.classList.add('show');
            const rect = el.getBoundingClientRect();
            tb.style.left = rect.left + 'px';
            tb.style.top = (rect.top - 50) + 'px';
        }

        function showDocToolbar(el, item) {
            const tb = document.getElementById('itemToolbar');
            tb.innerHTML = '';
            const docDiv = el.querySelector('.doc');
            const toggleBtn = document.createElement('button');
            toggleBtn.textContent = docDiv.classList.contains('no-frame') ? '🖼 Рамка' : '◻ Без рамки';
            toggleBtn.className = 'tool-btn';
            toggleBtn.onclick = () => {
                item.noFrame = !item.noFrame;
                docDiv.classList.toggle('no-frame', item.noFrame);
                autoSave();
                showDocToolbar(el, item);
                if (selectedEl) {
                    // === Пункт 4: обновляем overlay после перерисовки ===
                    requestAnimationFrame(() => showCtrlOverlay(selectedEl));
                }
            };
            const editBtn = document.createElement('button');
            editBtn.textContent = '✎ Редактировать подпись';
            editBtn.className = 'tool-btn';
            editBtn.onclick = () => {
                const cap = el.querySelector('.caption');
                if (cap) { cap.setAttribute('contenteditable', 'true');
                    cap.focus(); }
            };

            const coverBtn = document.createElement('button');
            const hasCover = item.cover ? true : false;
            coverBtn.textContent = hasCover ? '✕ Убрать обложку' : '➕ Добавить обложку';
            coverBtn.className = 'tool-btn' + (hasCover ? ' danger' : '');
            coverBtn.onclick = () => {
                if (hasCover) {
                    delete item.cover;
                    delete item.coverWidth;
                    delete item.coverHeight;
                    const parent = el.closest('.draggable');
                    if (parent) {
                        const newEl = buildItemElement(item, state.current);
                        parent.replaceWith(newEl);
                        if (selectedItem && selectedItem.id === item.id) {
                            selectedEl = newEl;
                            showDocToolbar(newEl, item);
                            showCtrlOverlay(newEl);
                        }
                        autoSave();
                    }
                } else {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => {
                                item.cover = ev.target.result;
                                item.coverWidth = img.width;
                                item.coverHeight = img.height;
                                const parent = el.closest('.draggable');
                                if (parent) {
                                    const newEl = buildItemElement(item, state.current);
                                    parent.replaceWith(newEl);
                                    if (selectedItem && selectedItem.id === item.id) {
                                        selectedEl = newEl;
                                        showDocToolbar(newEl, item);
                                        showCtrlOverlay(newEl);
                                    }
                                    autoSave();
                                }
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                        input.value = '';
                    };
                    input.click();
                }
            };
            const colorGroup = document.createElement('div');
            colorGroup.className = 'swatch-group';
            PLATE_COLORS.forEach(c => {
                const sw = document.createElement('div');
                sw.className = 'swatch';
                sw.style.background = c;
                sw.onclick = () => {
                    item.plate = c;
                    docDiv.style.background = c;
                    const under = docDiv.querySelector('.doc-under');
                    if (under) under.style.background = c;
                    const cap = docDiv.querySelector('.caption');
                    if (cap) cap.style.color = getCaptionColor(c);
                    autoSave();
                };
                colorGroup.appendChild(sw);
            });
            tb.appendChild(toggleBtn);
            tb.appendChild(editBtn);
            tb.appendChild(coverBtn);
            tb.appendChild(colorGroup);
            tb.classList.add('show');
            const rect = el.getBoundingClientRect();
            tb.style.left = rect.left + 'px';
            tb.style.top = (rect.top - 50) + 'px';
        }

        // ----- функции для меню "+" -----
        function toggleAddMenu(btn) {
            const container = btn.closest('.add-dropdown');
            const menu = container.querySelector('.add-menu');
            const isOpen = menu.classList.contains('show');
            document.querySelectorAll('.add-menu.show').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.add-main-btn.open').forEach(b => b.classList.remove('open'));
            if (!isOpen) {
                menu.classList.add('show');
                btn.classList.add('open');
            }
        }

        document.addEventListener('click', (e) => {

        // === Пункт 3: при переключении слайдов персонажи на стенах падают ===
        function goToSlide(idx, animate, dir = idx > state.current ? 1 : -1) {
            // Сначала обрабатываем персонажей на стенах
            if (window.WebmejiManager && window.WebmejiManager.creatures) {
                const creatures = window.WebmejiManager.creatures;
                creatures.forEach(({ creature }) => {
                    // Если персонаж на левой или правой стене — заставляем падать
                    if (creature.currentEdge === 'left' || creature.currentEdge === 'right') {
                        creature.currentEdge = 'bottom';
                        creature.isJumping = false;
                        creature.resetAnimation();
                        creature.fallToBottom(creature.spriteConfig.fallspeed || 200);
                    }
                });
            }

            if (idx < 0) idx = state.slides.length - 1;
            if (idx >= state.slides.length) idx = 0;
            state.current = idx;
            const scroller = document.getElementById('scroller');
            scroller.scrollTo({ left: idx * window.innerWidth, behavior: animate ? 'smooth' : 'auto' });

        function handleDropOnSlide(e, slideIdx) {
            e.preventDefault();
            e.stopPropagation();
            const sec = e.currentTarget;
            sec.classList.remove('drag-over');
            const rect = sec.getBoundingClientRect();
            const dropX = e.clientX - rect.left,
                dropY = e.clientY - rect.top;
            const allFiles = Array.from(e.dataTransfer.files);
            // Проверяем, есть ли zip-архивы
            const zipFiles = allFiles.filter(f => f.name.endsWith('.zip') || f.type === 'application/zip');
            if (zipFiles.length > 0) {
                zipFiles.forEach(f => processZipFile(f));
                document.getElementById('creaturePanel').classList.add('show');
                window.WebmejiManager.renderList();
                return;
            }
            // Обрабатываем изображения и документы
            const files = allFiles.filter(f => f.type.startsWith('image/') || isDocFile(f));
            if (files.length === 0) return;
            const itemsLayer = sec.querySelector('.items-layer');
            if (!itemsLayer) return;
            const hint = itemsLayer.querySelector('.empty-hint');
            if (hint) hint.remove();

            files.forEach((file, idx) => {

                reader.onload = ev => {

                        const item = {
                            id: newId,
                            type: 'photo',
                            src: ev.target.result,
                            left: (dropX + idx * 20) + 'px',
                            top: (dropY + idx * 20) + 'px',

                            z: 4

                        itemsLayer.appendChild(buildItemElement(item, slideIdx));
                    } else if (isDoc) {
                        const item = {
                            id: newId,
                            type: docType,
                            src: ev.target.result,
                            left: (dropX + idx * 20) + 'px',
                            top: (dropY + idx * 20) + 'px',
                            tx: 0,
                            ty: 0,
                            scale: 1,

                        state.slides[slideIdx].items.push(item);
                        itemsLayer.appendChild(buildItemElement(item, slideIdx));
                    }
                    autoSave();
                };
                reader.readAsDataURL(file);
            });

            const sec = document.querySelector(`.section[data-index="${idx}"]`);
            if (sec) {

        // === Пункт 1: loadProject с параметром showOverlay (только для верхней кнопки) ===
        function loadProject(file, showOverlay = false) {
            const overlay = document.getElementById('loadingOverlay');
            if (showOverlay) overlay.classList.add('show');

            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    state.slides = data.slides;
                    uid = data.uid || 1;
                    state.projectTitle = data.projectTitle || 'ПОСТПРОСТРАНСТВО';
                    state.current = 0;
                    fullRender();
                    goToSlide(0, false);
                    if (data.creatures && window.WebmejiManager) {
                        window.WebmejiManager.loadCreaturesData(data.creatures);
                    }
                    if (state.mode === 'view') takeFullSnapshot();
                    if (showOverlay) setTimeout(() => overlay.classList.remove('show'), 400);
                } catch (err) {
                    if (showOverlay) overlay.classList.remove('show');
                    alert('Ошибка загрузки');
                }
            };
            reader.onerror = () => {
                if (showOverlay) overlay.classList.remove('show');
                alert('Ошибка чтения файла');
            };
            reader.readAsText(file);
        }

        function pasteCenterPos(itemsLayer) {
            const rect = itemsLayer.getBoundingClientRect();
            return {
                left: Math.round(rect.width / 2 - 100) + 'px',
                top: Math.round(rect.height / 2 - 80) + 'px'
            };

        /* ================= PDF ПРОСМОТРЩИК ================= */
        const pdfV = {
            doc: null,
            page: 1,
            total: 1,
            zoomMode: 'fit',
            zoomValue: 1.0,
            currentScale: 1.0,
            lastUserZoom: 1.0,
            item: null,
            rendering: false
        };

        function dataUrlToUint8(dataUrl) {
            const raw = atob(dataUrl.split(',')[1]);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            return bytes;
        }

        function openPdfViewer(item) {
            if (!window.pdfjsLib) { alert('PDF.js не загружен'); return; }
            pdfV.item = item;
            pdfV.page = 1;
            if (item.pdfZoomMode) {
                pdfV.zoomMode = item.pdfZoomMode;
                pdfV.zoomValue = item.pdfZoomValue || 1.0;
            } else {
                pdfV.zoomMode = 'fit';
                pdfV.zoomValue = 1.0;
            }
            pdfV.currentScale = 1.0;
            pdfV.lastUserZoom = (item.pdfZoomMode === 'custom' && item.pdfZoomValue) ? item.pdfZoomValue : 1.0;
            if (!item.pdfBg || !item.pdfText) {
                item.pdfBg = PDF_THEMES[1].bg;
                item.pdfText = PDF_THEMES[1].text;
            }
            const viewer = document.getElementById('pdfViewer');
            viewer.classList.add('show');
            buildPdfThemes();
            applyPdfColors();
            pdfjsLib.getDocument({ data: dataUrlToUint8(item.src) }).promise.then(pdf => {
                pdfV.doc = pdf;
                pdfV.total = pdf.numPages;
                renderPdfPage();
            }).catch(() => alert('Ошибка чтения PDF'));
        }

        function closePdfViewer() {
            if (pdfV.item) {
                pdfV.item.pdfZoomMode = pdfV.zoomMode;
                pdfV.item.pdfZoomValue = pdfV.zoomValue;
                autoSave();
            }
            document.getElementById('pdfViewer').classList.remove('show');
            pdfV.doc = null;
            pdfV.item = null;
            document.getElementById('pdfTextLayer').innerHTML = '';
        }

        function computeFitScale(page) {
            const scroll = document.getElementById('pdfScroll');
            const vp1 = page.getViewport({ scale: 1 });
            const availW = scroll.clientWidth - 40;
            const availH = scroll.clientHeight - 40;
            return Math.min(availW / vp1.width, availH / vp1.height);
        }

        function renderPdfPage() {
            if (!pdfV.doc || pdfV.rendering) return;
            pdfV.rendering = true;
            pdfV.doc.getPage(pdfV.page).then(page => {
                let scale;
                if (pdfV.zoomMode === 'fit') {
                    scale = computeFitScale(page);
                } else if (pdfV.zoomMode === '160') {
                    scale = 1.6;
                } else {
                    scale = pdfV.zoomValue;
                }
                pdfV.currentScale = scale;
                if (pdfV.zoomMode !== 'custom') {
                    pdfV.zoomValue = scale;
                }

                const vp = page.getViewport({ scale });
                const canvas = document.getElementById('pdfCanvas');
                const holder = document.getElementById('pdfPageHolder');
                const ctx = canvas.getContext('2d');
                const ratio = window.devicePixelRatio || 1;
                canvas.width = vp.width * ratio;
                canvas.height = vp.height * ratio;
                canvas.style.width = vp.width + 'px';
                canvas.style.height = vp.height + 'px';
                holder.style.width = vp.width + 'px';
                holder.style.height = vp.height + 'px';
                ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

                // === Пункт 5: для оригинального режима не используем фон темы ===
                const bg = pdfV.item.pdfOriginal ? '#ffffff' : (pdfV.item.pdfBg || '#ffffff');
                page.render({
                    canvasContext: ctx,
                    viewport: vp,
                    background: bg
                }).promise.then(() => {
                    renderPdfTextLayer(page, vp);
                    pdfV.rendering = false;
                    applyPdfColors();
                }).catch(() => { pdfV.rendering = false; });
                updatePdfUI();
            });
        }

        function renderPdfTextLayer(page, vp) {
            const layer = document.getElementById('pdfTextLayer');
            layer.innerHTML = '';
            layer.style.width = vp.width + 'px';
            layer.style.height = vp.height + 'px';
            page.getTextContent().then(tc => {
                tc.items.forEach(it => {
                    const span = document.createElement('span');
                    const tx = pdfjsLib.Util.transform(vp.transform, it.transform);
                    const fontSize = Math.hypot(tx[2], tx[3]);
                    span.textContent = it.str;
                    span.style.left = tx[4] + 'px';
                    span.style.top = (tx[5] - fontSize) + 'px';
                    span.style.fontSize = fontSize + 'px';
                    span.style.fontFamily = 'sans-serif';
                    layer.appendChild(span);
                });
            });
        }

        function updatePdfUI() {
            document.getElementById('pdfPageInfo').textContent = pdfV.page + ' / ' + pdfV.total;
            const zd = document.getElementById('pdfZoomDisplay');
            if (pdfV.zoomMode === 'fit') zd.textContent = 'Вписать';
            else if (pdfV.zoomMode === '160') zd.textContent = '160%';
            else zd.textContent = Math.round(pdfV.zoomValue * 100) + '%';
        }

        function pdfNext() { if (pdfV.page < pdfV.total) { pdfV.page++;
                renderPdfPage(); } }

        function pdfPrev() { if (pdfV.page > 1) { pdfV.page--;
                renderPdfPage(); } }

        function pdfZoom(delta) {
            let base = pdfV.currentScale;
            let newScale = Math.max(0.2, Math.min(6, base + delta));
            pdfV.zoomValue = newScale;
            pdfV.zoomMode = 'custom';
            pdfV.lastUserZoom = newScale;
            renderPdfPage();
        }

        function pdfToggleZoom() {
            if (pdfV.zoomMode === 'fit') {
                pdfV.zoomMode = '160';
            } else if (pdfV.zoomMode === '160') {
                pdfV.zoomMode = 'custom';
                pdfV.zoomValue = pdfV.lastUserZoom || pdfV.currentScale;
            } else {
                pdfV.zoomMode = 'fit';
            }
            renderPdfPage();
        }

        function buildPdfThemes() {
            const wrap = document.getElementById('pdfThemeSwatches');
            wrap.innerHTML = '';
            PDF_THEMES.forEach((theme, idx) => {
                const sw = document.createElement('div');
                sw.className = 'theme-swatch';
                sw.style.background = theme.bg;
                sw.style.color = theme.text;
                sw.textContent = theme.icon || 'Aa';
                sw.title = theme.name;
                // === Пункт 5: подсветка активной темы с учётом original ===
                if (pdfV.item && pdfV.item.pdfOriginal && theme.original) {
                    sw.classList.add('active');
                } else if (pdfV.item && !pdfV.item.pdfOriginal &&
                           pdfV.item.pdfBg === theme.bg && pdfV.item.pdfText === theme.text && !theme.original) {
                    sw.classList.add('active');
                }
                sw.onclick = () => {
                    pdfV.item.pdfBg = theme.bg;
                    pdfV.item.pdfText = theme.text;
                    pdfV.item.pdfOriginal = !!theme.original;
                    applyPdfColors();
                    renderPdfPage();
                    autoSave();
                    wrap.querySelectorAll('.theme-swatch').forEach(el => el.classList.remove('active'));
                    sw.classList.add('active');
                };
                wrap.appendChild(sw);
            });
        }

        function applyPdfColors() {
            const holder = document.getElementById('pdfPageHolder');
            const canvas = document.getElementById('pdfCanvas');

            // === Пункт 5: оригинальный режим — никакой перекраски ===
            if (pdfV.item.pdfOriginal) {
                holder.style.background = '#ffffff';
                canvas.style.filter = '';
                delete canvas.dataset.tint;
                return;
            }

            const bg = pdfV.item.pdfBg || '#ffffff';
            holder.style.background = bg;
            if (pdfV.item.pdfText) {
                canvas.dataset.tint = pdfV.item.pdfText;
                applyTextTint();
            } else {
                canvas.style.filter = '';
                delete canvas.dataset.tint;
            }
        }

        function applyTextTint() {
            const canvas = document.getElementById('pdfCanvas');
            const tint = canvas.dataset.tint;
            if (!tint) return;
            const ctx = canvas.getContext('2d');
            try {
                const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const d = img.data;
                const tc = hexToRgb(tint);
                const bg = hexToRgb(pdfV.item.pdfBg || '#ffffff');
                for (let i = 0; i < d.length; i += 4) {
                    const lum = (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114);
                    const t = 1 - lum / 255;
                    d[i] = Math.round(bg.r + (tc.r - bg.r) * t);
                    d[i + 1] = Math.round(bg.g + (tc.g - bg.g) * t);
                    d[i + 2] = Math.round(bg.b + (tc.b - bg.b) * t);
                }
                ctx.putImageData(img, 0, 0);
            } catch (e) {}
        }

        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
            const n = parseInt(hex, 16);
            return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
        }

        /* ================= DOC/TXT ПРОСМОТРЩИК (постранично) ================= */
        const docV2 = {
            item: null,
            type: null,
            data: null,
            fileName: null,
            pages: [],
            page: 1,
            total: 1,
            zoomMode: 'fit',
            zoomValue: 1.0,
            currentScale: 1.0,
            lastUserZoom: 1.0,
            _isPlain: false
        };

        const PAGE_W = 794;
        const PAGE_H = 1123;

        function openDocumentViewer(item) {
            const type = item.type || 'pdf';
            if (type === 'pdf') { openPdfViewer(item); return; }

            docV2.item = item;
            docV2.type = type;
            docV2.data = item.src;
            docV2.fileName = item.fileName || item.content || 'документ';
            docV2.page = 1;
            docV2.zoomMode = item.pdfZoomMode || 'fit';
            docV2.zoomValue = item.pdfZoomValue || 1.0;
            docV2.lastUserZoom = (item.pdfZoomMode === 'custom' && item.pdfZoomValue) ? item.pdfZoomValue : 1.0;
            if (!item.pdfBg || !item.pdfText) {
                item.pdfBg = PDF_THEMES[1].bg;
                item.pdfText = PDF_THEMES[1].text;
            }

            const viewer = document.getElementById('docViewer');
            viewer.classList.add('show');
            buildDocThemes();

            // === Пункт 2: кнопка скачивания удалена, поэтому не привязываем ===

            if (type === 'txt') {
                try {
                    const raw = atob(docV2.data.split(',')[1]);
                    const text = decodeURIComponent(escape(raw));
                    paginateText(text, true);
                } catch (e) {
                    paginateText('Не удалось прочитать текстовый файл.', true);
                }
                renderDocPage();
            } else if (type === 'docx') {
                const arrayBuffer = dataUrlToUint8(docV2.data).buffer;
                if (window.mammoth) {
                    mammoth.convertToHtml({ arrayBuffer })
                        .then(result => { paginateHtml(result.value);
                            renderDocPage(); })
                        .catch(() => { paginateText('Не удалось прочитать .docx файл.', true);
                            renderDocPage(); });
                } else {
                    paginateText('Библиотека для .docx не загружена.', true);
                    renderDocPage();
                }
            } else {
                try {
                    const raw = atob(docV2.data.split(',')[1]);
                    const text = raw.replace(/[^\x09\x0A\x0D\x20-\x7Eа-яА-ЯёЁ]/g, ' ').replace(/\s{3,}/g, '\n\n');
                    paginateText(text.trim() || 'Документ .doc — отображение ограничено. Скачайте файл.', true);
                } catch (e) {
                    paginateText('Не удалось прочитать .doc файл.', true);
                }
                renderDocPage();
            }
        }

        function paginateText(text, isPlain) {
            const measurer = document.createElement('div');
            measurer.style.cssText =
                `position:absolute;visibility:hidden;width:${PAGE_W - 140}px;font-family:${isPlain ? 'monospace':"'Times New Roman',serif"};font-size:${isPlain?'16px':'18px'};line-height:1.8;white-space:pre-wrap;word-wrap:break-word;`;
            document.body.appendChild(measurer);
            const maxH = PAGE_H - 120;
            const lines = text.split('\n');
            docV2.pages = [];
            let current = '';
            for (let i = 0; i < lines.length; i++) {
                const test = current ? current + '\n' + lines[i] : lines[i];
                measurer.textContent = test;
                if (measurer.offsetHeight > maxH && current) {
                    docV2.pages.push(current);
                    current = lines[i];
                } else {
                    current = test;
                }
            }
            if (current) docV2.pages.push(current);
            if (docV2.pages.length === 0) docV2.pages = [''];
            measurer.remove();
            docV2.total = docV2.pages.length;
            docV2._isPlain = isPlain;
        }

        function paginateHtml(html) {
            const measurer = document.createElement('div');
            measurer.style.cssText =
                `position:absolute;visibility:hidden;width:${PAGE_W - 140}px;font-family:'Times New Roman',serif;font-size:18px;line-height:1.8;`;
            document.body.appendChild(measurer);
            measurer.innerHTML = html;
            const nodes = Array.from(measurer.childNodes);
            const maxH = PAGE_H - 120;

            const test = document.createElement('div');
            test.style.cssText = measurer.style.cssText;
            document.body.appendChild(test);

            docV2.pages = [];
            let buffer = '';
            nodes.forEach(node => {
                const html = node.outerHTML || node.textContent || '';
                test.innerHTML = buffer + html;
                if (test.offsetHeight > maxH && buffer) {
                    docV2.pages.push(buffer);
                    buffer = html;
                } else {
                    buffer += html;
                }
            });
            if (buffer) docV2.pages.push(buffer);
            if (docV2.pages.length === 0) docV2.pages = [''];
            measurer.remove();
            test.remove();
            docV2.total = docV2.pages.length;
            docV2._isPlain = false;
        }

        function computeDocFitScale() {
            const scroll = document.getElementById('docScroll');
            const availW = scroll.clientWidth - 40;
            const availH = scroll.clientHeight - 40;
            return Math.min(availW / PAGE_W, availH / PAGE_H);
        }

        function renderDocPage() {
            const holder = document.getElementById('docPageHolder');
            const content = document.getElementById('docContent');
            const item = docV2.item;

            let scale;
            if (docV2.zoomMode === 'fit') scale = computeDocFitScale();
            else if (docV2.zoomMode === '160') scale = 1.6;
            else scale = docV2.zoomValue;
            docV2.currentScale = scale;
            if (docV2.zoomMode !== 'custom') docV2.zoomValue = scale;

            holder.style.width = (PAGE_W * scale) + 'px';
            holder.style.height = (PAGE_H * scale) + 'px';

            // === Пункт 5: оригинальный режим — без перекраски ===
            if (item.pdfOriginal) {
                holder.style.background = '#ffffff';
                content.style.color = '#14110c';
            } else {
                holder.style.background = item.pdfBg || '#ffffff';
                content.style.color = item.pdfText || '#14110c';
            }

            content.style.width = PAGE_W + 'px';
            content.style.minHeight = PAGE_H + 'px';
            content.style.transform = `scale(${scale})`;
            content.style.transformOrigin = 'top left';
            content.style.fontFamily = docV2._isPlain ? 'monospace' : "'Times New Roman',serif";
            content.style.fontSize = docV2._isPlain ? '16px' : '18px';
            content.style.whiteSpace = docV2._isPlain ? 'pre-wrap' : 'normal';

            const pageHtml = docV2.pages[docV2.page - 1] || '';
            if (docV2._isPlain) content.textContent = pageHtml;
            else content.innerHTML = pageHtml;

            document.getElementById('docPageInfo').textContent = docV2.page + ' / ' + docV2.total;
            const zd = document.getElementById('docZoomDisplay');
            if (docV2.zoomMode === 'fit') zd.textContent = 'Вписать';
            else if (docV2.zoomMode === '160') zd.textContent = '160%';
            else zd.textContent = Math.round(docV2.zoomValue * 100) + '%';
        }

        function docNextPage() { if (docV2.page < docV2.total) { docV2.page++;
                renderDocPage(); } }

        function docPrevPage() { if (docV2.page > 1) { docV2.page--;
                renderDocPage(); } }

        function docZoom(delta) {
            let base = docV2.currentScale;
            docV2.zoomValue = Math.max(0.2, Math.min(6, base + delta));
            docV2.zoomMode = 'custom';
            docV2.lastUserZoom = docV2.zoomValue;
            renderDocPage();
        }

        function docToggleZoom() {
            if (docV2.zoomMode === 'fit') docV2.zoomMode = '160';
            else if (docV2.zoomMode === '160') {
                docV2.zoomMode = 'custom';
                docV2.zoomValue = docV2.lastUserZoom || docV2.currentScale;
            } else docV2.zoomMode = 'fit';
            renderDocPage();
        }

        function buildDocThemes() {
            const wrap = document.getElementById('docThemeSwatches');
            wrap.innerHTML = '';
            PDF_THEMES.forEach(theme => {
                const sw = document.createElement('div');
                sw.className = 'theme-swatch';
                sw.style.background = theme.bg;
                sw.style.color = theme.text;
                sw.textContent = theme.icon || 'Aa';
                sw.title = theme.name;
                // === Пункт 5: подсветка для doc ===
                if (docV2.item && docV2.item.pdfOriginal && theme.original) {
                    sw.classList.add('active');
                } else if (docV2.item && !docV2.item.pdfOriginal &&
                           docV2.item.pdfBg === theme.bg && docV2.item.pdfText === theme.text && !theme.original) {
                    sw.classList.add('active');
                }
                sw.onclick = () => {
                    docV2.item.pdfBg = theme.bg;
                    docV2.item.pdfText = theme.text;
                    docV2.item.pdfOriginal = !!theme.original;
                    renderDocPage();
                    wrap.querySelectorAll('.theme-swatch').forEach(el => el.classList.remove('active'));
                    sw.classList.add('active');
                };
                wrap.appendChild(sw);
            });
        }

        function closeDocViewer() {
            if (docV2.item) {
                docV2.item.pdfZoomMode = docV2.zoomMode;
                docV2.item.pdfZoomValue = docV2.zoomValue;
            }
            document.getElementById('docViewer').classList.remove('show');
            docV2.item = null;
            docV2.pages = [];
        }

        document.getElementById('docClose').addEventListener('click', closeDocViewer);
        document.getElementById('docNext').addEventListener('click', docNextPage);
        document.getElementById('docPrev').addEventListener('click', docPrevPage);
        document.getElementById('docZoomIn').addEventListener('click', () => docZoom(0.2));
        document.getElementById('docZoomOut').addEventListener('click', () => docZoom(-0.2));
        document.getElementById('docZoomDisplay').addEventListener('click', docToggleZoom);

        document.getElementById('docScroll').addEventListener('wheel', (e) => {
            e.stopPropagation();
            if (e.ctrlKey) { e.preventDefault();
                docZoom(e.deltaY < 0 ? 0.15 : -0.15); return; }
            const scroll = e.currentTarget;
            const fitsVert = scroll.scrollHeight <= scroll.clientHeight + 4;
            if (fitsVert) {
                e.preventDefault();
                if (e.deltaY > 0) docNextPage();
                else docPrevPage();
            } else {
                const atBottom = scroll.scrollTop + scroll.clientHeight >= scroll.scrollHeight - 2;
                const atTop = scroll.scrollTop <= 2;
                if (e.deltaY > 0 && atBottom) { e.preventDefault();
                    docNextPage(); } else if (e.deltaY < 0 && atTop) { e.preventDefault();
                    docPrevPage(); }
            }
        }, { passive: false });

        // Клавиатурная навигация для docViewer
        document.addEventListener('keydown', (e) => {
            const viewer = document.getElementById('docViewer');
            if (!viewer.classList.contains('show')) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault();
                docNextPage(); } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e
                    .preventDefault();
                docPrevPage(); } else if (e.key === 'Escape') closeDocViewer();
        });

        // resize для docViewer
        window.addEventListener('resize', () => {
            if (document.getElementById('docViewer').classList.contains('show') && docV2.zoomMode === 'fit') {
                renderDocPage();
            }
            if (document.getElementById('pdfViewer').classList.contains('show') && pdfV.zoomMode === 'fit') {
                renderPdfPage();
            }
        });

        /* ================= ВСТАВКА ИЗ БУФЕРА ================= */
        document.addEventListener('paste', (e) => {
            if (document.activeElement && document.activeElement.isContentEditable) return;
            if (document.getElementById('pdfViewer').classList.contains('show')) return;
            if (document.getElementById('docViewer').classList.contains('show')) return;

            const slideIdx = state.current;
            const sec = document.querySelector(`.section[data-index="${slideIdx}"]`);
            if (!sec) return;
            const itemsLayer = sec.querySelector('.items-layer');
            if (!itemsLayer) return;

            const cd = e.clipboardData;
            if (!cd) return;
            let handled = false;

            // Проверяем файлы
            for (const itm of cd.items) {
                if (itm.kind === 'file') {
                    const file = itm.getAsFile();
                    if (!file) continue;
                    if (file.type.startsWith('image/')) {
                        pasteAsImage(file, itemsLayer, slideIdx);
                        handled = true;
                    } else if (isDocFile(file)) {
                        pasteAsDocument(file, itemsLayer, slideIdx);
                        handled = true;
                    } else if (file.name.endsWith('.zip') || file.type === 'application/zip') {
                        processZipFile(file);
                        document.getElementById('creaturePanel').classList.add('show');
                        window.WebmejiManager.renderList();
                        handled = true;
                    }
                }
            }

            // Если файлы обработаны — завершаем
            if (handled) { e.preventDefault(); return; }

            // Проверяем текст
            const text = cd.getData('text/plain');
            if (text && text.trim()) {
                // === Пункт 3: новая метка ===
                const PREFIX = 'POST<#qqq#>PROST: ';
                if (text.startsWith(PREFIX)) {
                    e.preventDefault();
                    try {
                        const jsonStr = text.substring(PREFIX.length);
                        const data = JSON.parse(jsonStr);
                        if (data && typeof data === 'object' && data.type) {
                            const newId = 'el' + (uid++);
                            const newItem = { ...data };
                            newItem.id = newId;
                            const baseLeft = parseFloat(newItem.left) || 0;
                            const baseTop = parseFloat(newItem.top) || 0;
                            newItem.left = (baseLeft + 20) + 'px';
                            newItem.top = (baseTop + 20) + 'px';
                            newItem.tx = 0;
                            newItem.ty = 0;
                            newItem.scale = 1;
                            newItem.rot = 0;
                            newItem.z = 4;

                            state.slides[slideIdx].items.push(newItem);
                            const el = buildItemElement(newItem, slideIdx);
                            itemsLayer.appendChild(el);
                            const hint = itemsLayer.querySelector('.empty-hint');
                            if (hint) hint.remove();
                            autoSave();
                            showNotification('Элемент вставлен', 'success', 2000);
                            return;
                        } else {
                            showNotification('Вставка невозможна', 'error', 3000);
                        }
                    } catch (err) {
                        showNotification('Вставка невозможна', 'error', 3000);
                    }
                    return;
                }

                // Если текст без метки — вставляем как обычный текст
                e.preventDefault();
                pasteAsText(text.trim(), itemsLayer, slideIdx);
            }
        });

        function pasteAsImage(file, itemsLayer, slideIdx) {
            const reader = new FileReader();
            reader.onload = ev => {
                const pos = pasteCenterPos(itemsLayer);
                const item = {
                    id: 'el' + (uid++),
                    type: 'photo',
                    src: ev.target.result,
                    left: pos.left,
                    top: pos.top,
                    tx: 0,
                    ty: 0,
                    scale: 1,
                    rot: 0,
                    content: 'без названия',
                    noFrame: false,
                    plate: '',
                    z: 4
                };
                state.slides[slideIdx].items.push(item);
                const hint = itemsLayer.querySelector('.empty-hint');
                if (hint) hint.remove();
                itemsLayer.appendChild(buildItemElement(item, slideIdx));
                autoSave();
            };
            reader.readAsDataURL(file);
        }

        function pasteAsDocument(file, itemsLayer, slideIdx) {
            const docType = getDocType(file.type) || getDocTypeFromName(file.name);
            if (!docType) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const pos = pasteCenterPos(itemsLayer);
                const item = {
                    id: 'el' + (uid++),
                    type: docType,
                    src: ev.target.result,
                    left: pos.left,
                    top: pos.top,
                    tx: 0,
                    ty: 0,
                    scale: 1,
                    rot: 0,
                    content: file.name || 'документ',
                    noFrame: false,
                    plate: '',
                    z: 4,
                    pdfBg: PDF_THEMES[1].bg,
                    pdfText: PDF_THEMES[1].text,
                    pdfZoomMode: 'fit',
                    pdfZoomValue: 1.0,
                    cover: null,
                    fileName: file.name
                };
                state.slides[slideIdx].items.push(item);
                const hint = itemsLayer.querySelector('.empty-hint');
                if (hint) hint.remove();
                itemsLayer.appendChild(buildItemElement(item, slideIdx));
                autoSave();
            };
            reader.readAsDataURL(file);
        }

        function pasteAsText(text, itemsLayer, slideIdx) {
            const pos = pasteCenterPos(itemsLayer);
            const item = {
                id: 'el' + (uid++),
                type: 'text',
                left: pos.left,
                top: pos.top,
                tx: 0,
                ty: 0,
                scale: 1,
                rot: 0,
                content: escapeHtml(text).replace(/\n/g, '<br>'),
                color: '#e8ddc4',
                align: 'left',
                plate: '',
                kind: '',
                hasFrame: false,
                z: 4
            };
            state.slides[slideIdx].items.push(item);
            const hint = itemsLayer.querySelector('.empty-hint');
            if (hint) hint.remove();
            itemsLayer.appendChild(buildItemElement(item, slideIdx));
            autoSave();
        }

        /* --- Базовые обработчики --- */
        document.getElementById('viewer').addEventListener('click', () => document.getElementById('viewer').classList.remove(
            'show'));
        document.getElementById('leftArrow').onclick = () => navSlide(-1);
        document.getElementById('rightArrow').onclick = () => navSlide(1);
        document.getElementById('saveBtn').onclick = saveProject;

        document.getElementById('editModeBtn').onclick = () => setMode('edit');
        document.getElementById('viewModeBtn').onclick = () => setMode('view');
        const persistBtn = document.getElementById('dragPersistBtn');
        if (persistBtn) persistBtn.onclick = toggleDragPersist;
        const resetBtn = document.getElementById('resetViewBtn');
        if (resetBtn) resetBtn.onclick = resetToSnapshot;
        const titleSpan = document.getElementById('projectTitleSpan');
        titleSpan.addEventListener('blur', () => { state.projectTitle = titleSpan.innerText;
            autoSave(); });

        // === Пункт 1: fileInput с флагом для отключения оверлея при загрузке из intro ===
        const loadBtn = document.getElementById('loadBtn');
        if (loadBtn) {
            loadBtn.onclick = () => document.getElementById('loadFileInput').click();
        }
        const fileInput = document.getElementById('loadFileInput');
        fileInput.onchange = (e) => {
            if (e.target.files && e.target.files[0]) {
                const fromIntro = !!window._introLoading;
                loadProject(e.target.files[0], !fromIntro);
                window._introLoading = false;
            }
            e.target.value = '';
        };

        document.addEventListener('keydown', (e) => {
            if (state.mode === 'view' && e.key === 'Control') {
                e.preventDefault();
                toggleDragPersist();
            }
        });

        let wheelAccum = 0,
            wheelLock = false;
        document.addEventListener('wheel', e => {
            const ae = document.activeElement;
            if (ae && ae.getAttribute('contenteditable') === 'true') return;
            const panel = document.getElementById('creaturePanel');
            if (panel && panel.classList.contains('show') && panel.contains(e.target)) {
                return;
            }
            e.preventDefault();
            if (wheelLock) return;
            wheelAccum += (Math.abs(e.deltaX) > Math.abs(e.deltaY)) ? e.deltaX : e.deltaY;
            if (Math.abs(wheelAccum) > 200) {
                const dir = wheelAccum > 0 ? 1 : -1;
                wheelAccum = 0;
                wheelLock = true;
                navSlide(dir);
                setTimeout(() => wheelLock = false, 500);
            }
            clearTimeout(window.wheelTimer);
            window.wheelTimer = setTimeout(() => wheelAccum = 0, 150);
        }, { passive: false });

        document.addEventListener('keydown', e => {
            const pdfViewer = document.getElementById('pdfViewer');
            if (pdfViewer.classList.contains('show')) return;
            const docViewer = document.getElementById('docViewer');
            if (docViewer.classList.contains('show')) return;

            const activeEl = document.activeElement;
            const isEditable = activeEl && (activeEl.getAttribute('contenteditable') === 'true' || activeEl
                .tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');
            if (isEditable) return;
            if (e.key === 'ArrowLeft') navSlide(-1);
            if (e.key === 'ArrowRight') navSlide(1);
            if (e.key === 'Delete' && selectedEl && state.mode === 'edit') deleteCurrentItem();
            if (e.key === 'Escape') deselect();

            // === Пункт 1: копирование по Ctrl+C (KeyC) работает на любой раскладке ===
            if (e.ctrlKey && e.code === 'KeyC' && state.mode === 'edit' && selectedItem) {
                e.preventDefault();
                const data = JSON.stringify(selectedItem);
                const prefix = 'POST<#qqq#>PROST: ';
                const full = prefix + data;
                navigator.clipboard.writeText(full).then(() => {
                    if (selectedEl) {
                        selectedEl.style.outline = '2px solid var(--accent)';
                        setTimeout(() => { if (selectedEl) selectedEl.style.outline = ''; }, 400);
                    }
                    showNotification('Элемент скопирован', 'success', 1500);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = full;
                    document.body.appendChild(ta);
                    ta.select();
                    try {
                        document.execCommand('copy');
                        showNotification('Элемент скопирован', 'success', 1500);
                    } catch (err) {
                        showNotification('Не удалось скопировать', 'error', 2000);
                    }
                    ta.remove();
                });
            }
        });

        document.addEventListener('mousedown', e => {
            if (state.mode !== 'edit') return;
            if (!e.target.closest('.draggable') && !e.target.closest('#ctrlOverlay') && !e.target.closest(
                    '.item-toolbar') && !e.target.closest('.text-toolbar'))
                deselect();
        });

        /* ---- события PDF просмотрщика ---- */
        document.getElementById('pdfClose').addEventListener('click', closePdfViewer);
        document.getElementById('pdfNext').addEventListener('click', pdfNext);
        document.getElementById('pdfPrev').addEventListener('click', pdfPrev);
        document.getElementById('pdfZoomIn').addEventListener('click', () => pdfZoom(0.2));
        document.getElementById('pdfZoomOut').addEventListener('click', () => pdfZoom(-0.2));
        document.getElementById('pdfZoomDisplay').addEventListener('click', pdfToggleZoom);

        document.getElementById('pdfScroll').addEventListener('wheel', (e) => {
            e.stopPropagation();
            if (e.ctrlKey) {
                e.preventDefault();
                pdfZoom(e.deltaY < 0 ? 0.15 : -0.15);
                return;
            }
            const scroll = e.currentTarget;
            const fitsVert = scroll.scrollHeight <= scroll.clientHeight + 4;
            if (fitsVert) {
                e.preventDefault();
                if (e.deltaY > 0) pdfNext();
                else pdfPrev();
            } else {
                const atBottom = scroll.scrollTop + scroll.clientHeight >= scroll.scrollHeight - 2;
                const atTop = scroll.scrollTop <= 2;
                if (e.deltaY > 0 && atBottom) { e.preventDefault();
                    pdfNext(); } else if (e.deltaY < 0 && atTop) { e.preventDefault();
                    pdfPrev(); }
            }
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            const viewer = document.getElementById('pdfViewer');
            if (!viewer.classList.contains('show')) return;
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault();
                pdfNext(); } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') { e
                    .preventDefault();
                pdfPrev(); } else if (e.key === 'Escape') closePdfViewer();
            else if ((e.ctrlKey || e.metaKey) && e.key === '=') { e.preventDefault();
                pdfZoom(0.2); } else if ((e.ctrlKey || e.metaKey) && e.key === '-') { e.preventDefault();
                pdfZoom(-0.2); }
        });

        /* --- НАЧАЛЬНЫЙ ЭКРАН --- */
        (function initIntro() {
            const screen = document.getElementById('introScreen');
            const btn = document.getElementById('introBtn');
            const slot = document.getElementById('introSlot');
            const closeBtn = document.getElementById('introClose');
            const SNAP_RADIUS = 70;
            let armed = false,
                dragging = false,
                pointerId = null,
                offX = 0,
                offY = 0;
            let alreadyUsed = false;

            function place(x, y) { btn.style.left = x + 'px';
                btn.style.top = y + 'px'; }

            function centerOfSlot() { const r = slot.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top +
                        r.height / 2 }; }

            function btnCenter() { const r = btn.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top +
                        r.height / 2 }; }

            function layout() { if (!armed) place(window.innerWidth * 0.62, window.innerHeight * 0.78); }
            layout();
            window.addEventListener('resize', layout);

            closeBtn.style.display = 'flex';

            screen.addEventListener('mousemove', (e) => { if (armed || dragging || alreadyUsed) return; const c =
                    btnCenter(); const dx = c.x - e.clientX,
                    dy = c.y - e.clientY; if (Math.hypot(dx, dy) < 130) { const r = btn.getBoundingClientRect();
                    const ang = Math.atan2(dy, dx); let nx = c.x + Math.cos(ang) * 180 - r.width / 2,
