                        ny = c.y + Math.sin(ang) * 180 - r.height / 2;
                    nx = Math.max(20, Math.min(window.innerWidth - r.width - 20, nx));
                    ny = Math.max(90, Math.min(window.innerHeight - r.height - 20, ny));
                    btn.classList.add('runaway');
                    place(nx, ny); } });

            btn.addEventListener('pointerdown', (e) => { if (armed || alreadyUsed) return;
                e.preventDefault();
                dragging = true;
                pointerId = e.pointerId;
                btn.setPointerCapture(pointerId);
                btn.classList.remove('runaway');
                btn.classList.add('dragging'); const r = btn.getBoundingClientRect();
                offX = e.clientX - r.left;
                offY = e.clientY - r.top; });
            btn.addEventListener('pointermove', (e) => { if (!dragging) return; let nx = e.clientX - offX,
                    ny = e.clientY - offY;
                place(nx, ny); const c = { x: nx + btn.offsetWidth / 2, y: ny + btn.offsetHeight / 2 }; const sc =
                    centerOfSlot(); const dist = Math.hypot(c.x - sc.x, c.y - sc.y);
                slot.classList.toggle('armed', dist < SNAP_RADIUS); });
            btn.addEventListener('pointerup', (e) => { if (!dragging) return;
                dragging = false;
                btn.classList.remove('dragging'); try { btn.releasePointerCapture(pointerId); } catch (err) {} const c =
                    btnCenter(); const sc = centerOfSlot(); const dist = Math.hypot(c.x - sc.x, c.y - sc.y); if (dist <
                    SNAP_RADIUS) { const targetX = sc.x - btn.offsetWidth / 2,
                        targetY = sc.y - btn.offsetHeight / 2;
                    btn.classList.add('snapping');
                    place(targetX, targetY);
                    slot.classList.remove('armed');
                    armed = true;
                    setTimeout(() => { btn.classList.remove('snapping');
                        btn.classList.add('armed');
                        btn.textContent = 'ЗАГРУЗИТЬ ▸'; }, 300); } else { slot.classList.remove('armed'); } });

            function finishIntro() { if (!screen || screen.classList.contains('hide')) return;
                screen.classList.add('hide');
                setMode('view');
                setTimeout(() => screen.remove(), 1200); }

            // === Пункт 1: начальный экран без кружка загрузки (флаг отключает оверлей) ===
            btn.addEventListener('click', () => {
                if (!armed || alreadyUsed) return;
                alreadyUsed = true;
                // Устанавливаем флаг, чтобы при загрузке через этот экран не показывался оверлей
                window._introLoading = true;
                const loadFileInput = document.getElementById('loadFileInput');
                const onLoad = () => {
                    setTimeout(() => {
                        if (screen && !screen.classList.contains('hide')) finishIntro();
                    }, 300);
                    loadFileInput.removeEventListener('change', onLoad);
                };
                loadFileInput.addEventListener('change', onLoad);
                loadFileInput.click();
            });

            closeBtn.addEventListener('click', finishIntro);
        })();

        state.slides = defaultSlides();
        state.projectTitle = 'ПОСТПРОСТРАНСТВО';
        fullRender();
        goToSlide(0, false);
    </script>

    <!-- ======================== ИНТЕГРАЦИЯ WEBMEJI ======================== -->
    <script>
        // ============================================================
        // ПОЛНЫЙ КОД WEBMEJI.JS (с изменениями по пунктам 1-5, 9-10)
        // ============================================================

        // preloads all frames from a given configuration
        function preloadImages(config) {
            const imagePaths = Object.values(config)
                .flatMap(item => (item.frames && Array.isArray(item.frames)) ? item.frames : []);
            return Promise.all(imagePaths.map(src => new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = resolve;
                img.onerror = reject;
                img.src = src;
            })));
        }

        // creature class -------------------------------------------------------
        class Creature {
            constructor(containerId, spriteConfig) {
                this.currentEdge = 'bottom';
                this._sizePercent = 100;

                this.container = document.createElement('div');
                this.container.className = 'webmeji-container';
                document.body.appendChild(this.container);

                this.img = document.createElement('img');
                this.img.id = containerId;
                this.img.src = spriteConfig.walk.frames[0] || '';
                this.container.appendChild(this.img);

                this.spriteConfig = spriteConfig;
                this.actionSequence = this.shuffle([...this.spriteConfig.ORIGINAL_ACTIONS]);
                this.currentActionIndex = 0;
                this.currentAction = null;
                this.frameTimer = null;
                this.dragFrameTimer = null;
                this.actionCompletionTimer = null;
                this.currentFrame = 0;
                this.direction = 1;
                this.facing = 'left';

                this.isDragging = false;
                this.isFalling = false;
                this.isPetting = false;
                this.isJumping = false;
                this.tripAfterFallActive = false;
                this.wasActionBeforePet = null;

                this.isPointerDown = false;
                window.addEventListener('mousedown', () => { this.isPointerDown = true; });
                window.addEventListener('mouseup', () => { this.isPointerDown = false; });
                window.addEventListener('touchstart', () => { this.isPointerDown = true; }, { passive: true });
                window.addEventListener('touchend', () => { this.isPointerDown = false; });

                // Для инерции
                this.dragVelocityX = 0;
                this.dragVelocityY = 0;
                this.lastDragX = 0;
                this.lastDragY = 0;
                this.lastDragTime = 0;

                const containerStyle = window.getComputedStyle(this.container);
                this.containerWidth = parseFloat(containerStyle.width);
                this.containerHeight = parseFloat(containerStyle.height);

                this.positionX = Math.random() * (window.innerWidth - this.containerWidth);
                this.positionY = window.innerHeight - this.containerHeight;

                this.container.style.left = `${this.positionX}px`;
                this.container.style.top = `${this.positionY}px`;

                this.maxPos = window.innerWidth - this.containerWidth;
                this.forceWalkAfter = false;
                this.forceThinkAfter = false;

                this.container.style.left = `${this.positionX}px`;
                this.container.style.top = 'auto';
                this.baseBottom = 0;

                this.updateImageDirection();

                this.currentAction = this.actionSequence[this.currentActionIndex];
                this.startAction(this.currentAction);

                this.animate = this.animate.bind(this);
                this.animationFrameId = requestAnimationFrame(this.animate);

                this.resizeHandler = () => {
                    const style = window.getComputedStyle(this.container);
                    this.containerWidth = parseFloat(style.width);
                    this.containerHeight = parseFloat(style.height);
                    this.maxPos = window.innerWidth - this.containerWidth;
                    this.positionX = Math.min(this.positionX, this.maxPos);
                    this.container.style.left = `${this.positionX}px`;
                };
                window.addEventListener('resize', this.resizeHandler);

                this.enablePetInteraction();
                this.enableDragInteraction();
            }

            shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            updateImageDirection() {
                this.img.style.transform = this.facing === 'left' ? 'scaleX(1)' : 'scaleX(-1)';
            }

            setFacingFromDelta(dx) {
                if (dx && !this.isDragging) {
                    this.facing = dx < 0 ? 'left' : 'right';
                    this.updateImageDirection();
                }
            }

            resetAnimation() {
                clearInterval(this.frameTimer);
                clearTimeout(this.actionCompletionTimer);
                this.currentFrame = 0;
                this.frameTimer = null;
                this.actionCompletionTimer = null;
            }

            clearAllTimers() {
                this.resetAnimation();
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
            }

            isSideEdge(edge) { return edge === 'left' || edge === 'right'; }
            isNonBottomEdge(edge) { return edge !== 'bottom'; }

            updateEdgeClass() {
                this.container.classList.remove('edge-left', 'edge-right', 'edge-top');
                if (!this.isDragging) {
                    this.currentEdge === 'left' && this.container.classList.add('edge-left');
                    this.currentEdge === 'right' && this.container.classList.add('edge-right');
                    this.currentEdge === 'top' && this.container.classList.add('edge-top');
                }
                this.applyEdgeOffset();
            }

            // === Пункт 7: левая стена -35, правая +20 ===
            applyEdgeOffset() {
                if (this.isDragging) return this.container.style.cssText =
                    `left:${this.positionX}px;top:${this.positionY}px`;
                if (this.currentEdge === 'left') {
                    this.positionX = -35;
                    this.container.style.left = this.positionX + 'px';
                } else {
                    this.container.style.left = this.positionX + 'px';
                }
                this.container.style.top = this.positionY + 'px';
            }

            // === Пункт 2: увеличенная скорость прыжка ===
            jumpToEdge(targetEdge) {
                if (this.isFalling || this.isPetting || this.isDragging || this.isJumping) return;
                if (!this.spriteConfig.ALLOWANCES.includes(targetEdge)) return;

                this.isJumping = true;
                this.resetAnimation();

                const jumpConfig = this.spriteConfig.jump;
                if (!jumpConfig) { this.isJumping = false; return; }

                const startX = this.positionX;
                const startY = this.positionY;
                let endX = startX;
                let endY = startY;

                // === Пункт 7: левая -35, правая +20 ===
                switch (targetEdge) {
                    case 'top':
                        endY = -5;
                        endX = Math.random() * (window.innerWidth - this.containerWidth);
                        break;
                    case 'left':
                        endX = -35;
                        endY = Math.random() * (window.innerHeight - this.containerHeight);
                        break;
                    case 'right':
                        endX = window.innerWidth - this.containerWidth + 20;
                        endY = Math.random() * (window.innerHeight - this.containerHeight);
                        break;
                }

                const dx = endX - startX;
                const dy = endY - startY;
                const distance = Math.hypot(dx, dy);

                if (distance === 0) { this.isJumping = false; return; }

                const duration = distance / (this.spriteConfig.jumpspeed || 800);
                const startTime = performance.now();

                let frameIndex = 0;
                const totalFrames = jumpConfig.frames.length;
                this.img.src = jumpConfig.frames[frameIndex];

                const frameTimer = setInterval(() => {
                    frameIndex = (frameIndex + 1) % totalFrames;
                    this.img.src = jumpConfig.frames[frameIndex];
                }, jumpConfig.interval);

                const step = (time) => {
                    if (this.isDragging) {
                        clearInterval(frameTimer);
                        this.isJumping = false;
                        return;
                    }

                    const elapsed = (time - startTime) / 1000;
                    const t = Math.min(elapsed / duration, 1);

                    this.positionX = startX + dx * t;
                    this.positionY = startY + dy * t;

                    if (dx !== 0) this.setFacingFromDelta(dx);

                    this.container.style.left = `${this.positionX}px`;
                    this.container.style.top = `${this.positionY}px`;

                    if (t < 1) {
                        requestAnimationFrame(step);
                    } else {
                        clearInterval(frameTimer);
                        this.isJumping = false;
                        this.currentEdge = targetEdge;
                        this.updateEdgeClass();
                        this.startEdgeIdle();
                    }
                };
                requestAnimationFrame(step);
            }

            startEdgeIdle() {
                this.updateEdgeClass();
                if (this.currentEdge === 'top') this.startAction('hangstillTop');
                else if (this.isSideEdge(this.currentEdge)) this.startAction('hangstillSide');
            }

            edgeAction() {
                if (this.isJumping || this.isFalling) return;
                const choice = this.spriteConfig.EDGE_ACTIONS[Math.floor(Math.random() * this.spriteConfig
                    .EDGE_ACTIONS.length)];
                choice === 'hang' ? this.startEdgeIdle() :
                    choice === 'climb' ? this.startAction(this.currentEdge === 'top' ? 'climbTop' : 'climbSide') :
                    choice === 'fall' && this.fallToBottom();
            }

            enablePetInteraction() {
                if (!this.spriteConfig.ALLOWANCES?.includes('pet') || !this.spriteConfig.ALLOWANCES?.includes('bottom'))
                    return;

                this.container.addEventListener('mouseenter', () => {
                    if (this.isFalling || this.isPointerDown || this.isPetting || this.isJumping || this
                        .currentEdge !== 'bottom') return;
                    this.isPetting = true;
                    this.wasActionBeforePet = this.currentAction;
                    this.startPetAnimation();
                });
                this.container.addEventListener('mouseleave', () => {
                    if (this.isFalling || this.isPointerDown || this.isJumping || this.currentEdge === 'top')
                        return;
                    this.isPetting = false;
                    this.stopPetAnimation();
                });
            }

            enableDragInteraction() {
                if (!this.spriteConfig.ALLOWANCES?.includes('drag')) return;
                if (!this.spriteConfig.ALLOWANCES?.includes('bottom')) return;

                let offsetX = 0;
                let offsetY = 0;

                const onPointerMove = (e) => {
                    e.preventDefault();

                    let clientX = e.clientX ?? e.touches?.[0].clientX;
                    let clientY = e.clientY ?? e.touches?.[0].clientY;

                    this.positionX = clientX - offsetX;
                    this.positionY = clientY - offsetY;

                    this.positionX = Math.max(0, Math.min(this.positionX, window.innerWidth - this.containerWidth));
                    this.positionY = Math.max(0, Math.min(this.positionY, window.innerHeight - this.containerHeight));

                    this.container.style.left = this.positionX + 'px';
                    this.container.style.top = this.positionY + 'px';
                };

                const onPointerUp = () => {
                    window.removeEventListener('mousemove', onPointerMove);
                    window.removeEventListener('touchmove', onPointerMove);
                    window.removeEventListener('mouseup', onPointerUp);
                    window.removeEventListener('touchend', onPointerUp);

                    this.isDragging = false;
                    this.isFalling = false;

                    this.resetAnimation();
                    this.fallToBottom();

                    this.animationFrameId = requestAnimationFrame(this.animate);
                };

                this.container.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    this.startDrag(e.clientX, e.clientY);
                });

                this.container.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.startDrag(touch.clientX, touch.clientY);
                });

                this.startDrag = (clientX, clientY) => {
                    this.resetAnimation();

                    if (this.animationFrameId) {
                        cancelAnimationFrame(this.animationFrameId);
                        this.animationFrameId = null;
                    }

                    this.isDragging = true;
                    this.tripAfterFallActive = false;
                    this.isJumping = false;
                    this.isFalling = false;
                    this.isPetting = false;

                    this.currentAction = 'drag';
                    this.img.style.transform = this.facing === 'left' ? 'scaleX(1)' : 'scaleX(-1)';

                    if (this.dragFrameTimer) clearInterval(this.dragFrameTimer);

                    this.startDragAnim();

                    const rect = this.container.getBoundingClientRect();
                    offsetX = clientX - rect.left;
                    offsetY = clientY - rect.top;

                    this.dragVelocityX = 0;
                    this.dragVelocityY = 0;
                    this.lastDragX = clientX;
                    this.lastDragY = clientY;
                    this.lastDragTime = performance.now();

                    const onPointerMoveLocal = (e) => {
                        e.preventDefault();

                        let clientX = e.clientX ?? e.touches?.[0].clientX;
                        let clientY = e.clientY ?? e.touches?.[0].clientY;

                        const now = performance.now();
                        const dt = (now - this.lastDragTime) / 1000;
                        const moveX = clientX - this.lastDragX;
                        const moveY = clientY - this.lastDragY;
                        if (dt > 0.01) {
                            this.dragVelocityX = moveX / dt;
                            this.dragVelocityY = moveY / dt;
                        }

                        this.lastDragX = clientX;
                        this.lastDragY = clientY;
                        this.lastDragTime = now;

                        this.positionX = clientX - offsetX;
                        this.positionY = clientY - offsetY;

                        this.positionX = Math.max(0, Math.min(this.positionX, window.innerWidth - this
                        .containerWidth));
                        this.positionY = Math.max(0, Math.min(this.positionY, window.innerHeight - this
                            .containerHeight));

                        this.container.style.left = this.positionX + 'px';
                        this.container.style.top = this.positionY + 'px';
                    };

                    const onPointerUpLocal = () => {
                        window.removeEventListener('mousemove', onPointerMoveLocal);
                        window.removeEventListener('touchmove', onPointerMoveLocal);
                        window.removeEventListener('mouseup', onPointerUpLocal);
                        window.removeEventListener('touchend', onPointerUpLocal);

                        this.isDragging = false;
                        this.isFalling = false;

                        if (this.dragFrameTimer) {
                            clearInterval(this.dragFrameTimer);
                            this.dragFrameTimer = null;
                        }

                        this.dragVelocityX *= 0.7;
                        this.dragVelocityY *= 0.7;

                        const speed = Math.hypot(this.dragVelocityX, this.dragVelocityY);
                        if (speed > 50) {
                            this.startInertia();
                        } else {
                            this.resetAnimation();
                            this.fallToBottom();
                            this.animationFrameId = requestAnimationFrame(this.animate);
                        }
                    };

                    window.addEventListener('mousemove', onPointerMoveLocal);
                    window.addEventListener('touchmove', onPointerMoveLocal, { passive: false });
                    window.addEventListener('mouseup', onPointerUpLocal);
                    window.addEventListener('touchend', onPointerUpLocal);
                };
            }

            startDragAnim() {
                if (this.dragFrameTimer) clearInterval(this.dragFrameTimer);
                const dragConfig = this.spriteConfig.drag;
                if (dragConfig && dragConfig.frames && dragConfig.frames.length) {
                    let frame = 0;
                    this.img.src = dragConfig.frames[0];
                    this.dragFrameTimer = setInterval(() => {
                        frame = (frame + 1) % dragConfig.frames.length;
                        this.img.src = dragConfig.frames[frame];
                    }, dragConfig.interval);
                }
            }

            // === Пункт 4: инерция с прыжком и падением, отскок от пола, шанс зацепиться ===
            startInertia() {
                let vx = this.dragVelocityX;
                let vy = this.dragVelocityY;
                const gravity = 1400;
                const friction = 0.99;
                let lastTime = performance.now();

                this.isJumping = true;
                this.resetAnimation();

                const jumpFrame = (this.spriteConfig.jump && this.spriteConfig.jump.frames[0]) || '';
                const fallFrame = (this.spriteConfig.falling && this.spriteConfig.falling.frames[0]) || '';
                let currentPhase = (vy < 0) ? 'up' : 'down';
                this.img.src = (currentPhase === 'up') ? jumpFrame : fallFrame;

                const BOUNCE_THRESHOLD = 300;
                const BOUNCE_FACTOR = 0.6;

                const step = (time) => {
                    if (this.isDragging || this.isFalling) { this.isJumping = false; return; }

                    const dt = Math.min((time - lastTime) / 1000, 0.05);
                    lastTime = time;

                    vy += gravity * dt;
                    vx *= friction;

                    this.positionX += vx * dt;
                    this.positionY += vy * dt;

                    // === Пункт 7: левая -35, правая +20 ===
                    if (this.positionX < -35) {
                        if (Math.random() < 0.15) {
                            this.positionX = -35;
                            this.positionY = Math.min(Math.max(this.positionY, 0), window.innerHeight - this
                                .containerHeight);
                            this.currentEdge = 'left';
                            this.isJumping = false;
                            this.resetAnimation();
                            this.updateEdgeClass();
                            this.startEdgeIdle();
                            this.animationFrameId = requestAnimationFrame(this.animate);
                            return;
                        } else {
                            this.positionX = -35;
                            vx = -vx * 0.5;
                        }
                    } else if (this.positionX > window.innerWidth - this.containerWidth + 20) {
                        if (Math.random() < 0.15) {
                            this.positionX = window.innerWidth - this.containerWidth + 20;
                            this.positionY = Math.min(Math.max(this.positionY, 0), window.innerHeight - this
                                .containerHeight);
                            this.currentEdge = 'right';
                            this.isJumping = false;
                            this.resetAnimation();
                            this.updateEdgeClass();
                            this.startEdgeIdle();
                            this.animationFrameId = requestAnimationFrame(this.animate);
                            return;
                        } else {
                            this.positionX = window.innerWidth - this.containerWidth + 20;
                            vx = -vx * 0.5;
                        }
                    }

                    if (this.positionY < -5 && vy < 0) {
                        if (Math.random() < 0.15) {
                            this.positionY = -5;
                            this.positionX = Math.min(Math.max(this.positionX, 0), window.innerWidth - this
                                .containerWidth);
                            this.currentEdge = 'top';
                            this.isJumping = false;
                            this.resetAnimation();
                            this.updateEdgeClass();
                            this.startEdgeIdle();
                            this.animationFrameId = requestAnimationFrame(this.animate);
                            return;
                        } else {
                            this.positionY = -5;
                            vy = Math.abs(vy) * 0.5;
                        }
                    }

                    if (vy < 0 && currentPhase !== 'up') {
                        currentPhase = 'up';
                        this.img.src = jumpFrame;
                    } else if (vy >= 0 && currentPhase !== 'down') {
                        currentPhase = 'down';
                        this.img.src = fallFrame;
                    }

                    if (vx !== 0) this.setFacingFromDelta(vx);

                    const floorY = window.innerHeight - this.containerHeight;
                    if (this.positionY >= floorY) {
                        this.positionY = floorY;
                        if (vy > BOUNCE_THRESHOLD) {
                            vy = -vy * BOUNCE_FACTOR;
                            if (Math.abs(vy) < 50) {
                                this.container.style.left = this.positionX + 'px';
                                this.container.style.top = this.positionY + 'px';
                                this.isJumping = false;
                                this.resetAnimation();
                                this.playTripAfterFall();
                                this.animationFrameId = requestAnimationFrame(this.animate);
                                return;
                            }
                            this.container.style.left = this.positionX + 'px';
                            this.container.style.top = this.positionY + 'px';
                            requestAnimationFrame(step);
                            return;
                        } else {
                            this.container.style.left = this.positionX + 'px';
                            this.container.style.top = this.positionY + 'px';
                            this.isJumping = false;
                            this.resetAnimation();
                            this.playTripAfterFall();
                            this.animationFrameId = requestAnimationFrame(this.animate);
                            return;
                        }
                    }

                    this.container.style.left = this.positionX + 'px';
                    this.container.style.top = this.positionY + 'px';

                    requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            }

            // === Пункт 2: forceFall только для стен ===
            forceFall() {
                if (this.isDragging) return;
                if (this.currentEdge === 'bottom') return;
                this.currentEdge = 'bottom';
                this.isJumping = false;
                this.resetAnimation();
                this.fallToBottom(this.spriteConfig.fallspeed || 200);
            }

            fallToBottom(fallSpeed = this.spriteConfig.fallspeed) {
                if (this.isFalling) return;
                this.tripAfterFallActive = false;
                this.isFalling = true;
                this.currentEdge = 'bottom';
                this.updateEdgeClass();
                this.resetAnimation();

                const cfg = this.spriteConfig.falling;
                if (!cfg) return;

                let frameIndex = 0;
                this.img.src = cfg.frames[0];
                this.frameTimer = setInterval(() => {
                    frameIndex = (frameIndex + 1) % cfg.frames.length;
                    this.img.src = cfg.frames[frameIndex];
                }, cfg.interval);

                const startY = this.positionY,
                    endY = window.innerHeight - this.containerHeight,
                    distance = endY - startY;
                if (distance <= 0) {
                    clearInterval(this.frameTimer);
                    this.frameTimer = null;
                    this.positionY = endY;
                    this.container.style.top = `${endY}px`;
                    return this.playTripAfterFall();
                }

                const startTime = performance.now();
                const step = (time) => {
                    if (this.isDragging) {
                        clearInterval(this.frameTimer);
                        this.frameTimer = null;
                        return this.animationFrameId = requestAnimationFrame(this.animate);
                    }

                    const elapsed = (time - startTime) / 1000;
                    const deltaY = fallSpeed * elapsed;
                    this.positionY = Math.min(startY + deltaY, endY);
                    this.container.style.top = `${this.positionY}px`;

                    if (this.positionY < endY) {
                        requestAnimationFrame(step);
                    } else {
                        clearInterval(this.frameTimer);
                        this.frameTimer = null;
                        this.positionY = endY;
                        this.container.style.top = `${endY}px`;
                        this.playTripAfterFall();
                    }
                };
                requestAnimationFrame(step);
            }

            playTripAfterFall() {
                const tripConfig = this.spriteConfig.fallen;
                if (!tripConfig) {
                    this.resumeAfterFallen();
                    return;
                }

                this.tripAfterFallActive = true;
                let frame = 0;
                const totalFrames = tripConfig.frames.length;
                this.img.src = tripConfig.frames[0];

                const frameTimer = setInterval(() => {
                    frame++;

                    if (frame >= totalFrames) {
                        clearInterval(frameTimer);
                        this.img.src = tripConfig.frames[totalFrames - 1];

                        setTimeout(() => {
                            if (this.tripAfterFallActive) this.resumeAfterFallen();
                        }, this.spriteConfig.gettingupspeed);
                    } else {
                        this.img.src = tripConfig.frames[frame];
                    }
                }, tripConfig.interval);
            }

            resumeAfterFallen() {
                if (this.isDragging) return;
                this.isFalling = false;
                this.isPetting = false;
                this.resetAnimation();
                this.lastTime = performance.now();
                this.currentAction = 'sit';
                this.setNextAction();
                this.animationFrameId = requestAnimationFrame(this.animate);
            }

            setNextAction() {
                if (this.isDragging || this.isFalling) return;

                this.resetAnimation();

                if (['top', 'left', 'right'].includes(this.currentEdge)) {
                    this.edgeAction();
                    return;
                }

                if (!this.isJumping && this.positionY >= window.innerHeight - this.containerHeight) {
                    if (Math.random() < this.spriteConfig.JUMP_CHANCE) {
                        const edges = ['top', 'left', 'right']
                            .filter(e => this.spriteConfig.ALLOWANCES.includes(e));

                        if (edges.length) {
                            const target = edges[Math.floor(Math.random() * edges.length)];
                            this.jumpToEdge(target);
                            return;
                        }
                    }
                }

                if (this.forceWalkAfter) {
                    this.forceWalkAfter = false;
                    this.startForcedWalk();
                    return;
                }

                if (this.forceThinkAfter) {
                    this.forceThinkAfter = false;
                    this.startForceThink();
                    return;
                }

                this.currentActionIndex++;
                if (this.currentActionIndex >= this.actionSequence.length) {
                    this.currentActionIndex = 0;
                    this.actionSequence = this.shuffle([...this.spriteConfig.ORIGINAL_ACTIONS]);
                }

                this.currentAction = this.actionSequence[this.currentActionIndex];
                this.startAction(this.currentAction);
            }

            startForcedWalk() {
                const { frames, interval } = this.spriteConfig.walk;
                const walkCycles = this.spriteConfig.forcewalk;
                this.currentAction = 'forced-walk';
                this.playAnimation(frames, interval, walkCycles.loops || 6, () => this.setNextAction());
            }

            startForceThink() {
                const { frames, interval, loops } = this.spriteConfig.forcethink;
                this.currentAction = 'force-think';
                this.playAnimation(frames, interval, loops || 2, () => this.setNextAction());
            }

            startPetAnimation() {
                this.resetAnimation();

                const petConfig = this.spriteConfig.pet;
                if (!petConfig) return;

                this.currentAction = 'pet';
                let frame = 0;
                this.img.src = petConfig.frames[0];

                this.frameTimer = setInterval(() => {
                    frame = (frame + 1) % petConfig.frames.length;
                    this.img.src = petConfig.frames[frame];
                }, petConfig.interval);
            }

            stopPetAnimation() {
                this.resetAnimation();
                this.currentAction = this.wasActionBeforePet || 'sit';
                this.wasActionBeforePet = null;
                this.setNextAction();
            }

            startAction(action) {
                if (this.isDragging || this.isFalling) return;
                this.currentAction = action;
                this.resetAnimation();

                if (action === 'climbTop') {
                    this.direction = Math.random() < 0.5 ? -1 : 1;
                    this.updateImageDirection();
                }
                if (action === 'climbSide') {
                    this.direction = Math.random() < 0.5 ? -1 : 1;
                }
                if (this.isJumping) {
                    this.animationFrameId = requestAnimationFrame(this.animate);
                    return;
                }

                const config = this.spriteConfig[action];
                if (!config) return;

                const { frames, interval, loops = 1 } = config;

                if (action === 'sit' || action === 'hangstillSide' || action === 'hangstillTop') {
                    const duration = config.randomizeDuration ?
                        Math.random() * (config.max - config.min) + config.min :
                        interval * loops;
                    this.img.src = frames[0];
                    this.actionCompletionTimer = setTimeout(() => {
                        this.forceWalkAfter = true;
                        this.setNextAction();
                    }, duration);
                    return;
                }

                this.playAnimation(frames, interval, loops, () => {
                    if (action === 'spin') {
                        this.direction *= -1;
                        this.facing = this.facing === 'left' ? 'right' : 'left';
                        this.updateImageDirection();
                    }

                    if (['trip', 'spin'].includes(action)) this.forceWalkAfter = true;
                    if (action === 'dance') this.forceThinkAfter = true;

                    this.setNextAction();
                });
            }

            playAnimation(frames, interval, loops, onComplete) {
                let playCount = 0,
                    f = 0;
                this.currentFrame = 0;
                this.img.src = frames[0];
                if (this.frameTimer) clearInterval(this.frameTimer);

                this.frameTimer = setInterval(() => {
                    this.currentFrame = f = (f + 1) % frames.length;
                    this.img.src = frames[f];
                    if (f === frames.length - 1 && ++playCount >= loops) {
                        clearInterval(this.frameTimer);
                        this.frameTimer = null;
                        this.currentAction = null;
                        this.actionCompletionTimer = setTimeout(onComplete, 0);
                    }
                }, interval);
            }

            animate(time) {
                if (!this.lastTime) this.lastTime = time;
                const delta = (time - this.lastTime) / 1000;
                this.lastTime = time;
                if (this.isDragging || this.isFalling) {
                    this.animationFrameId = requestAnimationFrame(this.animate);
                    return;
                }
                const movingActions = ['walk', 'forced-walk', 'climbTop'];
                if (movingActions.includes(this.currentAction)) {
                    const dx = this.direction * this.spriteConfig.walkspeed * delta;
                    this.positionX += dx;
                    this.setFacingFromDelta(dx);

                    if (this.positionX <= 0) {
                        this.positionX = 0;
                        this.direction = 1;
                        this.facing = 'right';
                        this.updateImageDirection();
                    } else if (this.positionX >= this.maxPos) {
                        this.positionX = this.maxPos;
                        this.direction = -1;
                        this.facing = 'left';
                        this.updateImageDirection();
                    }
                    this.applyEdgeOffset();
                }

                if (this.currentAction === 'climbSide') {
                    this.positionY += this.direction * this.spriteConfig.walkspeed * delta;

                    if (this.currentEdge === 'left') {
                        this.facing = 'left';
                    } else if (this.currentEdge === 'right') {
                        this.facing = 'right';
                    }
                    this.updateImageDirection();

                    const maxY = window.innerHeight - this.containerHeight;
                    if (this.positionY <= -5) {
                        this.positionY = -5;
                        this.direction = 1;
                    } else if (this.positionY >= maxY) {
                        this.positionY = maxY;
                        this.direction = -1;
                    }
                    this.applyEdgeOffset();
                }
                this.animationFrameId = requestAnimationFrame(this.animate);
            }
        }

        // ============================================================
        // Пункт 2: логика переключения масштаба по клику на проценты
        // ============================================================
        function getNextScaleStep(current) {
            const cycle = [150, 200, 50, 100];
            const idx = cycle.indexOf(current);
            if (idx !== -1) {
                return cycle[(idx + 1) % cycle.length];
            }
            if (current > 50 && current < 100) return 100;
            if (current > 100 && current < 150) return 150;
            if (current > 150 && current < 200) return 200;
            if (current < 50) return 50;
            if (current > 200) return 200;
            return 150;
        }

        // Глобальный менеджер персонажей
        window.WebmejiManager = {
            creatures: [],
            characters: {},
            creatureIdCounter: 0,

            addCharacter(name, config, previewUrl) {
                if (config.jumpspeed && config.jumpspeed < 300) config.jumpspeed = 800;
                this.characters[name] = { config, previewUrl, size: 100 };
                this.renderList();
            },

            // === Пункт 2: spawn с isSpawn ===
            spawnCharacter(name, size) {
                const char = this.characters[name];
                if (!char) return;
                const finalSize = size || char.size || 100;
                const id = 'creature-' + (++this.creatureIdCounter);
                const creature = new Creature(id, char.config);
                creature._sizePercent = finalSize;
                this.setCreatureSize(creature, finalSize, { isSpawn: true });
                this.creatures.push({ creature, name, size: finalSize });
                this.renderList();
            },

            // === Пункт 2: setCreatureSize с opts ===
            setCreatureSize(creature, sizePercent, opts = {}) {
                const oldSize = creature._sizePercent || 100;
                const baseSize = 100;
                const newWidth = baseSize * (sizePercent / 100);
                creature.container.style.width = newWidth + 'px';
                creature.container.style.height = newWidth + 'px';
                creature.containerWidth = newWidth;
                creature.containerHeight = newWidth;
                creature.maxPos = window.innerWidth - newWidth;
                creature._sizePercent = sizePercent;
                if (creature.positionX + newWidth > window.innerWidth) {
                    creature.positionX = window.innerWidth - newWidth;
                    creature.container.style.left = creature.positionX + 'px';
                }
                if (creature.positionY + newWidth > window.innerHeight) {
                    creature.positionY = window.innerHeight - newWidth;
                    creature.container.style.top = creature.positionY + 'px';
                }
                creature.applyEdgeOffset();

                // Падение только при уменьшении (не спавн) ИЛИ при увеличении на стене
                if (!opts.isSpawn) {
                    if (sizePercent < oldSize) {
                        creature.forceFall();
                    } else if (sizePercent > oldSize && creature.currentEdge !== 'bottom') {
                        creature.forceFall();
                    }
                }
            },

            updateSizeForName(name, newSize) {
                if (this.characters[name]) {
                    this.characters[name].size = newSize;
                }
                this.creatures.forEach(item => {
                    if (item.name === name) {
                        this.setCreatureSize(item.creature, newSize);
                        item.size = newSize;
                    }
                });
                this.renderList();
            },

            despawnOne(name) {
                const indexes = [];
                this.creatures.forEach((item, idx) => {
                    if (item.name === name) indexes.push(idx);
                });
                if (indexes.length === 0) return;
                const idx = indexes[indexes.length - 1];
                const removed = this.creatures.splice(idx, 1)[0];
                if (removed && removed.creature.container && removed.creature.container.parentNode) {
                    removed.creature.container.parentNode.removeChild(removed.creature.container);
                }
                if (removed.creature.clearAllTimers) removed.creature.clearAllTimers();
                this.renderList();
            },

            despawnAll(name) {
                const toRemove = this.creatures.filter(item => item.name === name);
                toRemove.forEach(item => {
                    if (item.creature.container && item.creature.container.parentNode) {
                        item.creature.container.parentNode.removeChild(item.creature.container);
                    }
                    if (item.creature.clearAllTimers) item.creature.clearAllTimers();
                });
                this.creatures = this.creatures.filter(item => item.name !== name);
                this.renderList();
            },

            clearAll() {
                this.creatures.forEach(item => {
                    if (item.creature.container && item.creature.container.parentNode) {
                        item.creature.container.parentNode.removeChild(item.creature.container);
                    }
                    if (item.creature.clearAllTimers) item.creature.clearAllTimers();
                });
                this.creatures = [];
                this.renderList();
            },

            getCreaturesDataForSave() {
                const charactersData = {};
                for (const [name, char] of Object.entries(this.characters)) {
                    charactersData[name] = {
                        config: char.config,
                        size: char.size || 100
                    };
                }
                const creaturesList = this.creatures.map(item => ({
                    name: item.name,
                    size: item.size
                }));
                return { characters: charactersData, creatures: creaturesList };
            },

            loadCreaturesData(data) {
                this.clearAll();
                this.characters = {};
                if (!data || !data.characters) return;
                for (const [name, charData] of Object.entries(data.characters)) {
                    this.characters[name] = {
                        config: charData.config,
                        previewUrl: charData.config.walk.frames[0] || '',
                        size: charData.size || 100
                    };
                }
                if (data.creatures && Array.isArray(data.creatures)) {
                    for (const item of data.creatures) {
                        if (this.characters[item.name]) {
                            this.spawnCharacter(item.name, item.size || 100);
                        }
                    }
                }
                this.renderList();
            },

            renderList() {
                const list = document.getElementById('creatureList');
                if (!list) return;
                list.innerHTML = '';
                for (const [name, char] of Object.entries(this.characters)) {
                    const count = this.creatures.filter(c => c.name === name).length;
                    const div = document.createElement('div');
                    div.className = 'creature-item';
                    const size = char.size || 100;
                    div.innerHTML = `
                        <img class="preview" src="${char.previewUrl}" alt="${name}">
                        <span class="info">${name} (${count})</span>
                        <div class="size-control">
                            <button class="size-down" data-name="${name}" title="Уменьшить">−</button>
                            <span class="size-label" data-name="${name}" style="cursor:pointer;" title="Переключить масштаб">${Math.round(size)}%</span>
                            <button class="size-up" data-name="${name}" title="Увеличить">+</button>
                        </div>
                        <div class="actions">
                            <button data-name="${name}" class="spawn-btn" title="Спавнить">+</button>
                            <button data-name="${name}" class="despawn-btn" title="Убрать одного">−</button>
                            <button data-name="${name}" class="despawn-all-btn" title="Убрать всех">🧹</button>
                            <button data-name="${name}" class="remove-char-btn danger" title="Удалить персонажа">Удалить</button>
                        </div>
                    `;
                    list.appendChild(div);
                }

                list.querySelectorAll('.spawn-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const name = btn.dataset.name;
                        this.spawnCharacter(name);
                    });
                });
                list.querySelectorAll('.despawn-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const name = btn.dataset.name;
                        this.despawnOne(name);
                    });
                });
                list.querySelectorAll('.despawn-all-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const name = btn.dataset.name;
                        this.despawnAll(name);
                    });
                });
                list.querySelectorAll('.remove-char-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const name = btn.dataset.name;
                        showConfirm(`Удалить персонажа "${name}" из библиотеки?`, () => {
                            this.despawnAll(name);
                            delete this.characters[name];
                            this.renderList();
                        });
                    });
                });

                list.querySelectorAll('.size-label').forEach(lbl => {
                    lbl.addEventListener('click', () => {
                        const name = lbl.dataset.name;
                        const char = this.characters[name];
                        if (char) {
                            const current = Math.round(char.size || 100);
                            const newSize = getNextScaleStep(current);
                            this.updateSizeForName(name, newSize);
                            this.renderList();
                        }
                    });
                });

                list.querySelectorAll('.size-up').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const name = btn.dataset.name;
                        const char = this.characters[name];
                        if (char) {
                            let newSize = (char.size || 100) + 5;
                            if (newSize > 200) newSize = 200;
                            this.updateSizeForName(name, newSize);
                            this.renderList();
                        }
                    });
                });
                list.querySelectorAll('.size-down').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const name = btn.dataset.name;
                        const char = this.characters[name];
                        if (char) {
                            let newSize = (char.size || 100) - 5;
                            if (newSize < 50) newSize = 50;
                            this.updateSizeForName(name, newSize);
                            this.renderList();
                        }
                    });
                });
            }
        };

        // Функция для создания конфига из загруженных файлов (data URL)
        function buildCreatureConfig(filesMap, name) {
            const defaultConfig = {
                ALLOWANCES: ['pet', 'drag', 'bottom', 'top', 'left', 'right'],
                walkspeed: 50,
                fallspeed: 200,
                jumpspeed: 800,
                gettingupspeed: 2000,
                walk: {
                    frames: ["shime1.png", "shime2.png", "shime3.png", "shime2.png"],

                    loops: 6
                },

                    interval: 200,
                    loops: 1
                },
                sit: {

                    loops: 1,
                    randomizeDuration: true,
                    min: 3000,
                    max: 11000
                },

                forcewalk: { loops: 6 },
                forcethink: {

            function replaceStrings(obj) {
                if (Array.isArray(obj)) {
                    return obj.map(item => replaceStrings(item));
                } else if (obj && typeof obj === 'object') {
                    const newObj = {};
                    for (const key in obj) {
                        newObj[key] = replaceStrings(obj[key]);
                    }
                    return newObj;
                } else if (typeof obj === 'string') {
                    return filesMap[obj] || obj;
                } else {
                    return obj;
                }
            }

            return replaceStrings(defaultConfig);
        }

        // Обработка zip-архива
        function processZipFile(file) {
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const zip = await JSZip.loadAsync(e.target.result);
                    const files = {};
                    let folderName = '';
                    let firstImage = null;
                    for (const [path, zipEntry] of Object.entries(zip.files)) {
                        if (zipEntry.dir) {
                            if (!folderName) {
                                const parts = path.split('/');
                                if (parts.length > 1) folderName = parts[0];
                            }
                            continue;
                        }
                        const fileName = path.split('/').pop();
                        if (fileName.match(/^shime\d+\.png$/i)) {
                            const blob = await zipEntry.async('blob');
                            const dataUrl = await new Promise(resolve => {
                                const fr = new FileReader();
                                fr.onload = () => resolve(fr.result);
                                fr.readAsDataURL(blob);
                            });
                            files[fileName] = dataUrl;
                            if (!firstImage) firstImage = dataUrl;
                        }
                    }
                    if (Object.keys(files).length === 0) {
                        alert('В архиве не найдены файлы shime*.png');
                        return;
                    }
                    const name = folderName || file.name.replace(/\.zip$/i, '');
                    const config = buildCreatureConfig(files, name);
                    window.WebmejiManager.addCharacter(name, config, firstImage);
                    window.WebmejiManager.spawnCharacter(name);
                } catch (err) {
                    alert('Ошибка при обработке zip: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Обработчик добавления персонажа через меню "+" (zip)
        function addCreatureFromInput(event, slideIdx) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            files.forEach(f => processZipFile(f));
            document.getElementById('creaturePanel').classList.add('show');
            window.WebmejiManager.renderList();
            event.target.value = '';
            closeAllMenus();
        }

        // Функция показа модального окна
        let confirmCallback = null;

        function showConfirm(message, onConfirm) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmMessage').textContent = message;
            modal.classList.add('show');
            confirmCallback = onConfirm;
        }

        document.getElementById('confirmCancel').addEventListener('click', () => {
            document.getElementById('confirmModal').classList.remove('show');
            confirmCallback = null;
        });
        document.getElementById('confirmOk').addEventListener('click', () => {
            document.getElementById('confirmModal').classList.remove('show');
            if (confirmCallback) {
                confirmCallback();
                confirmCallback = null;
            }
        });

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            const panel = document.getElementById('creaturePanel');
            const floatBtn = document.getElementById('creaturesFloatingBtn');
            const closeBtn = document.getElementById('creaturePanelClose');
            const addBtn = document.getElementById('addCreatureBtn');
            const clearBtn = document.getElementById('clearCreaturesBtn');
            const zipInput = document.getElementById('creatureZipInput');

            // === Пункт 6: сдвиг окна влево и выше ===
            floatBtn.addEventListener('click', () => {
                panel.classList.toggle('show');
                if (panel.classList.contains('show')) {
                    if (!panel.dataset.moved) {
                        panel.style.right = '55px';
                        panel.style.bottom = '70px';
                        panel.style.left = 'auto';
                        panel.style.top = 'auto';
                    }
                    window.WebmejiManager.renderList();
                }
            });

            closeBtn.addEventListener('click', () => panel.classList.remove('show'));

            // Перетаскивание панели
            const panelTitle = document.getElementById('panelTitle');
            let isDragging = false;
            let dragOffsetX, dragOffsetY;

            panelTitle.addEventListener('mousedown', (e) => {
                if (e.target.closest('.close-btn')) return;
                isDragging = true;
                const rect = panel.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;
                panel.style.cursor = 'grabbing';
                panel.style.transition = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let left = e.clientX - dragOffsetX;
                let top = e.clientY - dragOffsetY;
                const maxX = window.innerWidth - panel.offsetWidth;
                const maxY = window.innerHeight - panel.offsetHeight;
                left = Math.max(0, Math.min(maxX, left));
                top = Math.max(0, Math.min(maxY, top));
                panel.style.left = left + 'px';
                panel.style.top = top + 'px';
                panel.style.right = 'auto';
                panel.style.bottom = 'auto';
                panel.dataset.moved = '1';
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    panel.style.cursor = 'default';
                    panel.style.transition = '';
                }
            });

            addBtn.addEventListener('click', () => {
                zipInput.click();
            });
            zipInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    Array.from(e.target.files).forEach(f => processZipFile(f));
                    panel.classList.add('show');
                    window.WebmejiManager.renderList();
                }
                e.target.value = '';
            });

            clearBtn.addEventListener('click', () => {
                window.WebmejiManager.clearAll();
            });

            document.addEventListener('dragover', (e) => e.preventDefault());
            document.addEventListener('drop', (e) => {
                const files = Array.from(e.dataTransfer.files);
                const zipFiles = files.filter(f => f.name.endsWith('.zip') || f.type === 'application/zip');
                if (zipFiles.length > 0) {
                    e.preventDefault();
                    zipFiles.forEach(f => processZipFile(f));
                    panel.classList.add('show');
                    window.WebmejiManager.renderList();
                }
            });
        });
    </script>
